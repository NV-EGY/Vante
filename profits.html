<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="manifest" href="manifest-profits.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="أرباح VANTÉ">
<meta name="application-name" content="أرباح VANTÉ">
<meta name="theme-color" content="#D4AF37">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="images/icon-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="images/icon-512x512.png">
    <meta charset="UTF-8">
    <title>لوحة الأرباح المتكاملة - VANTÉ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Cairo',sans-serif;background:#f4f6f9;padding:20px;}
        .container{max-width:1400px;margin:auto;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px;}
        .stat-card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05);border-right:5px solid #D4AF37;}
        .stat-card h3{font-size:14px;color:#666;margin-bottom:10px;}
        .stat-card .value{font-size:32px;font-weight:900;color:#111;}
        .filter-bar{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
        select, input, button{padding:10px;border-radius:12px;border:1px solid #ddd;font-family:Cairo;}
        .btn{background:#111;color:#fff;padding:10px 20px;border:none;border-radius:30px;cursor:pointer;}
        .btn-primary{background:#D4AF37;color:#000;font-weight:bold;}
        table{width:100%;background:#fff;border-radius:20px;overflow-x:auto;display:block;}
        th,td{padding:12px;text-align:center;border-bottom:1px solid #eee;}
        th{background:#111;color:#fff;}
        @media(max-width:700px){th,td{font-size:12px;}}
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: visible;
            opacity: 1;
            transition: 0.3s;
        }
        .password-overlay.hide {
            visibility: hidden;
            opacity: 0;
        }
        .password-box {
            background: #fff;
            border-radius: 32px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
        }
        .password-box h2 {
            color: #D4AF37;
            margin-bottom: 20px;
        }
        .password-box input {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: 1px solid #ddd;
            margin: 15px 0;
            font-size: 16px;
            text-align: center;
            letter-spacing: 2px;
        }
        .password-box button {
            background: #111;
            color: #fff;
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 10px;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

<div id="passwordOverlay" class="password-overlay">
    <div class="password-box">
        <h2><i class="fas fa-lock"></i> دخول خاص للأرباح</h2>
        <p>أدخل كلمة السر للوصول إلى لوحة الأرباح</p>
        <input type="password" id="passwordInput" placeholder="********">
        <div id="passwordError" class="error-msg"></div>
        <button id="confirmPasswordBtn">تأكيد</button>
    </div>
</div>

<div id="pageContent" style="display: none;">
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1><i class="fas fa-chart-line"></i> حساب الأرباح المتكامل</h1>
        <div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
            <button class="btn" onclick="window.location.href='admin-orders.html'">📦 العودة للطلبات</button>
        </div>
    </div>
    <div class="filter-bar">
        <select id="monthFilter">
            <option value="all">كل الشهور</option>
        </select>
        <button class="btn-primary" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> تصدير Excel</button>
        <button onclick="loadData()" class="btn">تحديث</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div style="background:#fff; border-radius:20px; padding:20px; overflow-x:auto;">
        <h3>📋 تفاصيل الطلبات المسلمة</h3>
        <table id="ordersTable">
            <thead><tr><th>رقم الطلب</th><th>العميل</th><th>تاريخ التسليم</th><th>الإجمالي (العميل)</th><th>تكلفة المنتجات (جملة)</th><th>تكلفة الشحن (مدفوعة)</th><th>صافي الربح</th></tr></thead>
            <tbody id="ordersList"><tr><td colspan="7">جاري التحميل...</td></tr></tbody>
        </table>
    </div>
    <div style="background:#fff; border-radius:20px; padding:20px; margin-top:30px; overflow-x:auto;">
        <h3>📦 منتجات المرتجع (Returned)</h3>
        <div id="returnedOrdersList" style="margin-top:15px;">
            <p style="color:#888;">جاري التحميل...</p>
        </div>
    </div>
</div>
</div>

<!-- سكربت كلمة السر (منفصل) -->
<script>
const SECRET_HASH = "VmFudGVQcm9maXRAMjAyNg==";

window.customConfirm = function(message) {
    return new Promise((resolve) => {
        if (confirm(message)) resolve(true);
        else resolve(false);
    });
};
window.customAlert = function(message, type) {
    alert(message);
};

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    const decodedSecret = atob(SECRET_HASH);
    if (input === decodedSecret) {
        document.getElementById("passwordOverlay").classList.add("hide");
        document.getElementById("pageContent").style.display = "block";
        // loadData سيتم استدعاؤها من الموديول تلقائياً، لكن نضمنها
        if (typeof loadData === 'function') loadData();
    } else {
        document.getElementById("passwordError").innerText = "❌ كلمة السر غير صحيحة";
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").focus();
    }
}

function logout() {
    document.getElementById("pageContent").style.display = "none";
    document.getElementById("passwordOverlay").classList.remove("hide");
    document.getElementById("passwordInput").value = "";
    document.getElementById("passwordError").innerText = "";
}

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("passwordOverlay").classList.remove("hide");
    document.getElementById("pageContent").style.display = "none";
    document.getElementById("confirmPasswordBtn").addEventListener("click", checkPassword);
    document.getElementById("passwordInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") checkPassword();
    });
});

window.logout = logout;
</script>

<!-- الموديول الرئيسي (بدون استيراد خارجي) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getFirestore, 
    collection, query, where, onSnapshot, getDocs,
    doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { logAuditEvent } from './js/logger.js';
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCotT8EP2uy_HsgHknxeGBorKoEUORPtmU",
    authDomain: "vante-orders.firebaseapp.com",
    projectId: "vante-orders",
    storageBucket: "vante-orders.firebasestorage.app",
    messagingSenderId: "842319700646",
    appId: "1:842319700646:web:f6afd78ef7038c3be4ca67"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(); // تعريف auth

console.log("✅ Firebase initialized");

// ========== دالة إعادة المخزون (مضمنة) ==========
async function restoreStockForOrder(orderId, orderData) {
    if (orderData.stockRestored) {
        console.log(`⚠️ المخزون للطلب ${orderId} تم استرجاعه مسبقاً، تخطي.`);
        return;
    }
    for (const item of (orderData.orderDetails || [])) {
        if (!item.name || !item.size) continue;
        let productId = item.productId;
        let productDoc;
        if (productId) {
            productDoc = await getDoc(doc(db, "products", productId));
        } else {
            const productSnap = await getDocs(query(collection(db, "products"), where("name", "==", item.name)));
            if (!productSnap.empty) productDoc = productSnap.docs[0];
        }
        if (productDoc && productDoc.exists()) {
            const productRef = doc(db, "products", productDoc.id);
            const stockBySize = productDoc.data().stockBySize || {};
            const currentStock = stockBySize[item.size];
            if (currentStock !== null && currentStock !== undefined) {
                stockBySize[item.size] = (currentStock || 0) + item.qty;
                await updateDoc(productRef, { stockBySize });
            }
        }
    }
    await updateDoc(doc(db, "orders", orderId), { stockRestored: true });
}

// ========== متغيرات عامة ==========
let allDeliveredOrders = [];
window.totalExpenses = 0;

// ========== تحميل الطلبات المسلمة ==========
async function loadData() {
    console.log("🔄 loadData called");
    const q = query(collection(db, "orders"), where("status", "==", "delivered"));
    onSnapshot(q, (snap) => {
        console.log(`📦 عدد الطلبات المسلمة: ${snap.size}`);
        allDeliveredOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        console.log("🛒 أول طلب:", allDeliveredOrders[0] || "لا يوجد");
        populateMonthFilter();
        applyFilter();
    }, (error) => {
        console.error("❌ خطأ في onSnapshot:", error);
        document.getElementById("ordersList").innerHTML = `<tr><td colspan="7">⚠️ خطأ في تحميل البيانات: ${error.message}</td></tr>`;
    });
}

// ========== مراقبة المصروفات ==========
onSnapshot(collection(db, "expenses"), (snap) => {
    const expenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.totalExpenses = expenses.reduce((s,e)=> s + (e.amount || 0), 0);
    if (typeof applyFilter === 'function') applyFilter();
}, (error) => {
    console.error("❌ خطأ في مصروفات:", error);
});

// ========== ملء قائمة الشهور ==========
function populateMonthFilter() {
    const monthsSet = new Set();
    allDeliveredOrders.forEach(o => {
        if (o.createdAt?.toDate) {
            const d = o.createdAt.toDate();
            monthsSet.add(`${d.getFullYear()}-${d.getMonth()+1}`);
        }
    });
    const select = document.getElementById("monthFilter");
    select.innerHTML = '<option value="all">كل الشهور</option>';
    [...monthsSet].sort().reverse().forEach(m => {
        const [year, month] = m.split('-');
        const name = new Date(year, month-1).toLocaleDateString('ar-EG', { year:'numeric', month:'long' });
        select.innerHTML += `<option value="${m}">${name}</option>`;
    });
}

// ========== تطبيق التصفية ==========
function applyFilter() {
    const filterVal = document.getElementById("monthFilter").value;
    let filtered = allDeliveredOrders;
    if (filterVal !== "all") {
        const [year, month] = filterVal.split('-');
        filtered = allDeliveredOrders.filter(o => {
            const d = o.createdAt?.toDate();
            return d && d.getFullYear() == year && (d.getMonth()+1) == month;
        });
    }
    console.log(`📊 عدد الطلبات بعد التصفية: ${filtered.length}`);
    renderStats(filtered);
    renderOrdersTable(filtered);
}

// ========== عرض الإحصائيات ==========
function renderStats(orders) {
    let totalRevenue = orders.reduce((s,o)=> s + (o.finalTotal || 0), 0);
    let totalCostProducts = orders.reduce((s,o)=> s + (o.totalCost || 0), 0);
    let totalShippingCost = orders.reduce((s,o)=> s + (o.shippingCostPaid || 0), 0);
    let totalExpenses = window.totalExpenses || 0;
    let netProfit = totalRevenue - totalCostProducts - totalShippingCost - totalExpenses;
    document.getElementById("statsGrid").innerHTML = `
        <div class="stat-card"><h3>💰 إجمالي الإيرادات</h3><div class="value">${totalRevenue.toFixed(2)} جنيه</div></div>
        <div class="stat-card"><h3>📦 تكلفة المنتجات (جملة)</h3><div class="value">${totalCostProducts.toFixed(2)} جنيه</div></div>
        <div class="stat-card"><h3>🚚 تكلفة الشحن الفعلية</h3><div class="value">${totalShippingCost.toFixed(2)} جنيه</div></div>
        <div class="stat-card"><h3>✅ صافي الربح</h3><div class="value" style="color:#27ae60;">${netProfit.toFixed(2)} جنيه</div></div>
    `;
}

// ========== عرض جدول الطلبات ==========
function renderOrdersTable(orders) {
    const tbody = document.getElementById("ordersList");
    if (orders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7">📭 لا توجد طلبات مسلمة في هذه الفترة</td></tr>`;
        return;
    }
    let html = '';
    orders.forEach(o => {
        const profit = (o.profit || (o.finalTotal - (o.totalCost||0) - (o.shippingCostPaid||0))).toFixed(2);
        html += `<tr>
            <td>${o.orderID}</td>
            <td>${o.customerName}</td>
            <td>${o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString('ar-EG') : '-'}</td>
            <td>${o.finalTotal || 0}</td>
            <td>${o.totalCost || 0}</td>
            <td>${o.shippingCostPaid || 0}</td>
            <td style="color:${profit>=0?'#27ae60':'#e74c3c'}">${profit}</td>
        </tr>`;
    });
    tbody.innerHTML = html;
}

// ========== تصدير Excel ==========
window.exportToExcel = () => {
    const rows = [];
    rows.push(['رقم الطلب', 'العميل', 'التاريخ', 'الإجمالي (العميل)', 'تكلفة المنتجات (جملة)', 'تكلفة الشحن (مدفوعة)', 'صافي الربح']);
    allDeliveredOrders.forEach(o => {
        rows.push([
            o.orderID, o.customerName,
            o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString('ar-EG') : '-',
            o.finalTotal || 0, o.totalCost || 0, o.shippingCostPaid || 0,
            (o.profit || (o.finalTotal - (o.totalCost||0) - (o.shippingCostPaid||0))).toFixed(2)
        ]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "الأرباح");
    XLSX.writeFile(wb, `profits_${new Date().toISOString().slice(0,10)}.xlsx`);
};

// ========== ربط الفلتر ==========
document.getElementById("monthFilter").addEventListener("change", applyFilter);

// ========== تعريف loadData على النافذة ==========
window.loadData = loadData;

// ========== تحميل البيانات فوراً ==========
loadData();

console.log("✅ الموديول جاهز");

// ========== قسم المرتجعات ==========
let returnedOrders = [];

onSnapshot(query(collection(db, "orders"), where("status", "==", "returned")), (snap) => {
    returnedOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderReturnedOrders();
});

function renderReturnedOrders() {
    const container = document.getElementById("returnedOrdersList");
    if (!container) return;
    if (returnedOrders.length === 0) {
        container.innerHTML = "<p style='color:#888;'>لا توجد منتجات مرتجعة</p>";
        return;
    }
    let html = `<table style="width:100%; border-collapse:collapse;">
        <thead><tr><th>رقم الطلب</th><th>العميل</th><th>تاريخ المرتجع</th><th>المنتجات</th><th>إجمالي المرتجع</th><th>الإجراءات</th></tr></thead><tbody>`;
    returnedOrders.forEach(o => {
        const totalReturned = o.orderDetails?.reduce((sum, item) => sum + (item.qty * item.price), 0) || 0;
        const products = o.orderDetails?.map(item => `${item.name} (x${item.qty})`).join(', ') || '-';
        html += `<tr>
            <td>${o.orderID}</td>
            <td>${o.customerName}</td>
            <td>${o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString('ar-EG') : '-'}</td>
            <td>${products}</td>
            <td>${totalReturned} جنيه</td>
            <td><button class="btn btn-primary" onclick="confirmReturnReceipt('${o.id}')" style="background:#D4AF37; color:#000; padding:5px 12px; border:none; border-radius:20px; cursor:pointer;">✅ تأكيد الاستلام</button></td>
        </tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
}

// دالة تأكيد استلام المرتجع
window.confirmReturnReceipt = async function(orderId) {
    const confirmed = await window.customConfirm("هل أنت متأكد من استلام المنتجات المرتجعة؟ سيتم إعادة الكميات للمخزون.");
    if (!confirmed) return;
    try {
        const orderSnap = await getDoc(doc(db, "orders", orderId));
        if (!orderSnap.exists()) {
            window.customAlert("❌ الطلب غير موجود", "error");
            return;
        }
        const order = orderSnap.data();
        await restoreStockForOrder(orderId, order);
        await updateDoc(doc(db, "orders", orderId), { 
            status: "returned_confirmed", 
            stockRestored: true 
        });
        window.customAlert("✅ تم تأكيد استلام المرتجع وإعادة الكميات", "success");
        await logAuditEvent({
    action: 'return_confirmed',
    orderId: orderId,
    orderNumber: order.orderID,
    details: {
        customerName: order.customerName,
        orderDetails: order.orderDetails,
        totalReturned: order.orderDetails?.reduce((sum, item) => sum + (item.qty * item.price), 0) || 0
    },
    performedBy: window.currentUserEmail || 'system',
    severity: 'info'
});
    } catch (e) {
        console.error(e);
        window.customAlert("❌ حدث خطأ", "error");
    }
};

onAuthStateChanged(auth, (user) => {
    if (user) {
        window.currentUserEmail = user.email;
        console.log("✅ تم تعيين البريد الإلكتروني:", user.email);
    }
});
</script>

<script>
  
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
}
</script>
</body>
</html>
