<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTÉ | Minimal Luxury</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
/* ====================================
   RESET
==================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Cairo',sans-serif;
    background:#ffffff;
    color:#111111;
    line-height:1.6;
    overflow-x:hidden;
}

img{
    max-width:100%;
    display:block;
}

a{
    text-decoration:none;
}

button,
input,
select{
    font-family:inherit;
    outline:none;
}

/* ====================================
   TOP OFFER BAR
==================================== */
.top-offer{
    background:#000;
    color:#D4AF37;
    padding:14px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    flex-wrap:wrap;
    text-align:center;
    font-size:14px;
    font-weight:700;
    border-bottom:1px solid rgba(212,175,55,.2);
}

.offer-text{
    letter-spacing:.5px;
}

.offer-timer{
    display:flex;
    align-items:center;
    gap:8px;
    direction:ltr;
    color:#fff;
    font-weight:700;
}

.offer-timer span{
    background:#D4AF37;
    color:#000;
    min-width:38px;
    padding:7px 10px;
    border-radius:10px;
    font-weight:900;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 15px rgba(212,175,55,.35);
}

/* ====================================
   NAVBAR
==================================== */
.nav-bar{
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:72px;
    padding:0 35px;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
    direction:ltr;
}

.logo{
    grid-column:1;
    justify-self:start;
    font-size:30px;
    font-weight:900;
    letter-spacing:3px;
    cursor:pointer;
    background:linear-gradient(135deg,#D4AF37,#FFD700,#B8860B);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    line-height:1;
}

.menu{
    grid-column:2;
    justify-self:center;
    display:flex;
    align-items:center;
    gap:28px;
    transform: translateX(-80px);
}

.menu a{
    color:#111;
    font-size:14.5px;
    font-weight:700;
    transition:.3s;
    position:relative;
    line-height:1;
    padding:6px 2px;
}

.menu a::after{
    content:'';
    position:absolute;
    bottom:-6px;
    right:0;
    width:0;
    height:2px;
    background:#D4AF37;
    transition:.3s;
}

.menu a:hover{
    color:#D4AF37;
}

.menu a:hover::after{
    width:100%;
}

.icons{
    grid-column:3;
    justify-self:end;
    display:flex;
    align-items:center;
    gap:10px;
}

.icons button{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:#111;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.3s;
    position:relative;
}

.icons button:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
}

.icons i{
    font-size:16px;
}

.cart-count{
    position:absolute;
    top:-6px;
    right:-6px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#D4AF37;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    border:2px solid #fff;
}

/* ====================================
   HERO
==================================== */
.hero{
    width:100%;
    overflow:hidden;
    line-height:0;
    background:#fff;
}

.hero img{
    width:100%;
    height:auto;
    object-fit:cover;
}

/* ====================================
   PRODUCTS
==================================== */
.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.container h2{
    text-align:center;
    margin-bottom:40px;
    font-size:34px;
    color:#111;
}

.modal-close{
    position: absolute;
    top: 18px;
    left: 18px;
    width: 48px;
    height: 48px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.96);
    color: #111;
    font-size: 26px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    transition: all 0.3s ease;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.modal-close:hover{
    background: #111;
    color: #fff;
    transform: rotate(90deg) scale(1.08);
    box-shadow: 0 18px 40px rgba(0,0,0,0.28);
}

.modal-close:active{
    transform: rotate(90deg) scale(0.95);
}

.modal-product-img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}
.modal-info {
    padding: 0 5px;
}
.modal-desc {
    color: #555;
    line-height: 1.9;
    font-size: 15px;
    margin-bottom: 18px;
    text-align: center;
}
.modal-price-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}
.modal-price {
    color: #D4AF37;
    font-size: 24px;
    font-weight: 900;
}
.modal-old-price {
    text-decoration: line-through;
    color: #999;
    font-size: 16px;
}
.modal-add-btn {
    width: 100%;
    margin-bottom: 15px;
    background: #111;
    color: #fff;
}
.modal-add-btn:hover {
    background: #D4AF37;
}
#reviewText {
    display: none; /* سيظهر بالجافاسكريبت */
    width: 100%;
    min-height: 100px;
    margin: 15px 0;
    padding: 15px;
    border: 1px solid #eee;
    border-radius: 12px;
    resize: vertical;
}

.product {
    background: #fff;
    border: none;
    border-radius: 24px;
    padding: 20px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
}
.product:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.08);
}

.product-image{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    cursor:pointer;
    margin-bottom:18px;
}

.product-image img{
    width:100%;
    transition:.5s;
}

.product:hover .product-image img{
    transform:scale(1.06);
}

.product-gallery{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px 0 20px;
}

.product-gallery img{
    width:65px;
    height:65px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    border:2px solid #eee;
    transition:.3s;
}

.product-gallery img:hover{
    border-color:#D4AF37;
    transform:translateY(-3px);
}


/* شارة الخصم */
.discount-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #D4AF37;
    color: #000;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 900;
    z-index: 10;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* اختيار المقاس في الكارد */
        /* تعديل شكل اختيار المقاس على الواجهة */
        .size-select {
            width: 100%;
            padding: 12px 15px;
            margin-top: 12px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23111' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: left 15px center;
        }
        .size-select:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

.add-cart-btn{
    margin-top:15px;
    font-size:16px;
    font-weight:800;
    letter-spacing:.3px;
}
      
.btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#000;
    color:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.btn-primary:hover{
    background:#D4AF37;
    color:#000;
}

.btn-secondary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#f2f2f2;
    color:#111;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.25s ease;
    margin-top:10px;
}

.btn-secondary:hover{
    background:#ddd;
}

.cart-item button{
    width:32px;
    height:32px;
    border-radius:8px;
    border:none;
    background:#111;
    color:#fff;
    cursor:pointer;
}

.cart-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;
    padding:15px 0;
    border-bottom:1px solid #eee;
    font-size:14px;
}

/* =========================================
   REVIEW SECTION
========================================= */

#reviewText{
    width:100%;
    min-height:120px;
    margin-top:18px;
    padding:18px;
    border:1px solid #e5e5e5;
    border-radius:18px;
    resize:none;
    font-size:15px;
    line-height:1.8;
    background:#fafafa;
}

#reviewText:focus{
    border-color:#D4AF37;
    background:#fff;
}

.review-label{
    text-align:right;
    margin:18px 0 8px;
    font-size:15px;
    font-weight:700;
    color:#222;
}

.review-submit{
    width:auto;
    min-width:180px;
    padding:13px 28px;
    margin:20px auto 0;
    display:block;
    border-radius:14px;
    font-size:14px;
    font-weight:800;
}

.modal-cart-btn{
    width:auto;
    min-width:220px;
    padding:14px 32px;
    margin:18px auto;
    display:block;
    border-radius:14px;
    font-size:15px;
    font-weight:800;
}

/* ====================================
   CART DRAWER
==================================== */
.drawer{
    position:fixed;
    top:0;
    right:-100%;
    width:380px;
    max-width:100%;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 40px rgba(0,0,0,.2);
    padding:25px;
    transition:.35s ease;
    z-index:2000;
    overflow-y:auto;
}

.drawer.active{
    right:0;
}

.total{
    text-align:center;
    font-size:24px;
    margin:25px 0;
    color:#D4AF37;
    font-weight:900;
}

/* ====================================
   MODAL
==================================== */
.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(.8);
    width:90%;
    max-width:450px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,.3);
    z-index:3000;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.modal.active{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
    visibility:visible;
}

.modal h2{
    text-align:center;
    margin-bottom:25px;
}

.modal input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

.modal-size{
    margin:22px 0;
    text-align:right;
}

.modal-size label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:800;
    color:#111;
}

.size-label{
    margin:10px 0;
    font-size:13px;
    color:#555;
    font-weight:700;
}

.sizes-text{
    color:#D4AF37;
    font-weight:900;
    margin-right:5px;
    letter-spacing:1px;
}

.sizes-wrap{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:12px 0;
}

.size-btn{
    width:38px;
    height:38px;
    border:1px solid #ddd;
    background:#fff;
    border-radius:10px;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    transition:.25s ease;
}

.size-btn:hover{
    border-color:#D4AF37;
    transform:translateY(-2px);
}

.size-btn.active{
    background:#111;
    color:#fff;
    border-color:#111;
}

.price-tag{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:6px;
    margin:6px 0 10px;
}

.price{
    font-size:18px;
    font-weight:900;
    color:#111;
}

.currency{
    font-size:12px;
    font-weight:700;
    color:#D4AF37;
    letter-spacing:1px;
}

body.modal-open{
    overflow:hidden;
}

.stars{
    margin-top:28px;
    margin-bottom:15px;
    text-align:center;
    font-size:34px;
}

.stars i{
    cursor:pointer;
    color:#ddd;
    transition:.25s;
}

.stars i.active,
.stars i:hover{
    color:#FFD700;
    transform:scale(1.12);
}

.review-submit:disabled{
    opacity:.45;
    cursor:not-allowed;
    transform:none;
}      

.modal-size select{
    width:100%;
    padding:14px 18px;
    border:1px solid #ddd;
    border-radius:14px;
    font-size:15px;
    background:#fff;
    cursor:pointer;
    outline:none;
    transition:.3s;
}

.modal-size select:focus{
    border-color:#D4AF37;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:1500;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

#overlay.active{
    opacity:1;
    visibility:visible;
}

.checkout-modal {
    position: fixed;
    inset: 50% auto auto 50%;
    transform: translate(-50%, -50%) scale(.9);
    width: 95%;
    max-width: 480px;
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,.18);
    z-index: 99999;
    opacity: 0;
    visibility: hidden;
    transition: .35s ease;
    overflow: hidden;
}

.checkout-modal.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
}

.checkout-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 30px;
    border-bottom: 1px solid #f1f1f1;
}

.checkout-header h2 {
    margin: 0;
    font-size: 28px;
    font-weight: 800;
    color: #111;
}

.product-description{
    margin:15px 0;
    color:#666;
    line-height:1.9;
    font-size:15px;
}

.close-modal {
    width: 42px;
    height: 42px;
    border: none;
    border-radius: 50%;
    background: #f7f7f7;
    cursor: pointer;
    font-size: 28px;
    transition: .3s;
}

.close-modal:hover {
    background: #111;
    color: #fff;
}

.checkout-body {
    padding: 30px;
}

.input-group,
.select-group {
    margin-bottom: 22px;
}

.input-group label,
.select-group label {
    display: block;
    margin-bottom: 10px;
    font-size: 14px;
    font-weight: 700;
    color: #222;
}

.input-group input,
.custom-select-wrapper select {
    width: 100%;
    height: 60px;
    padding: 0 22px;
    border: 1.5px solid #e5e5e5;
    border-radius: 18px;
    font-size: 15px;
    background: #fff;
    transition: .3s;
    outline: none;
}

.input-group input:focus,
.custom-select-wrapper select:focus {
    border-color: #000;
    box-shadow: 0 0 0 5px rgba(0,0,0,.07);
}

.custom-select-wrapper {
    position: relative;
}

.custom-select-wrapper select {
    appearance: none;
    padding-left: 55px;
    cursor: pointer;
}

.select-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
}

.custom-select-wrapper::after {
    content: "⌄";
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    color: #777;
    pointer-events: none;
}

.btn-primary,
.btn-secondary {
    width: 100%;
    height: 58px;
    border: none;
    border-radius: 18px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: .3s;
}

.btn-primary {
    background: #111;
    color: #fff;
    margin-bottom: 14px;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(0,0,0,.18);
}

.btn-secondary {
    background: #f5f5f5;
    color: #111;
}

.btn-secondary:hover {
    background: #ececec;
}

@media (max-width: 480px) {
    .checkout-header,
    .checkout-body {
        padding: 24px;
    }

    .checkout-header h2 {
        font-size: 24px;
    }
}

.mobile-actions,
.mobile-menu {
    display: none;
}

@media (max-width: 768px) {
    .nav-bar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:15px 18px;
        direction:ltr;
    }

    .mobile-actions{
        display:block;
        order:1;
    }

    .logo{
        order:2;
        font-size:28px;
        margin:0 auto;
    }

    .icons{
        order:3;
        display:flex;
        align-items:center;
        gap:0;
    }

    .menu{
        display:none !important;
    }

    .icons button:not(:last-child){
        display:none;
    }

    .mobile-btn{
        width:46px;
        height:46px;
        border:none;
        border-radius:50%;
        background:#111;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        font-size:18px;
    }

    .mobile-menu{
        display:flex;
        flex-direction:column;
        position:fixed;
        top:0;
        left:-100%;
        right:auto;
        width:320px;
        max-width:85%;
        height:100vh;
        background:#fff;
        padding:25px;
        z-index:5000;
        box-shadow:-10px 0 40px rgba(0,0,0,.25);
        transition:.4s ease;
    }

    .mobile-menu.active{
        left:0;
    }

    .mobile-menu-header{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom:30px;
        padding-bottom:20px;
        border-bottom:1px solid #eee;
    }

    .mobile-header-icons{
        display:flex;
        gap:12px;
    }
  
.mobile-icons-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
    margin-top:15px;
    padding:10px 5px;
}
  
    .mobile-icon{
        width:48px;
        height:48px;
        border:none;
        border-radius:50%;
        background:#111;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:18px;
    }

    .mobile-icon:hover{
        background:#D4AF37;
        color:#000;
        transform:translateY(-2px);
    }
  
    .close-menu{
      position:absolute;
        top:0;
        right:0;
        width:46px;
        height:46px;
        border:none;
        border-radius:50%;
        background:#f5f5f5;
        color:#111;
        box-shadow:none;
        transition:.3s;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        font-size:18px;
    }

    .mobile-menu a{
        padding:18px 0;
        border-bottom:1px solid #f2f2f2;
        color:#111;
        font-size:18px;
        font-weight:700;
        transition:.3s;
    }

    .mobile-menu a:hover{
        color:#D4AF37;
        padding-right:12px;
    }
    
    #menuOverlay{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.4);
        z-index:4000;
        opacity:0;
        visibility:hidden;
        transition:.3s;
    }

    #menuOverlay.active{
        opacity:1;
        visibility:visible;
    }
}

.rating-stars{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin:22px 0;
    direction:ltr;
    user-select:none;
}

.rating-stars span{
    font-size:42px;
    color:#ddd;
    cursor:pointer;
    transition:all .25s ease;
    line-height:1;
}

.rating-stars span:hover{
    transform:scale(1.2);
}

.rating-stars span.active{
    color:#FFD700;

const govSelect = document.getElementById("governorate");
const citySelect = document.getElementById("city");

Object.keys(govData).forEach(g => {
    let opt = document.createElement("option");
    opt.value = g;
    opt.textContent = g;
    govSelect.appendChild(opt);
});

govSelect.addEventListener("change", function () {
    citySelect.innerHTML = `<option value="" selected disabled>اختر المدينة</option>`;
    citySelect.value = "";
    if (govData[this.value]) {
        govData[this.value].forEach(city => {
            let opt = document.createElement("option");
            opt.value = city;
            opt.textContent = city;
            citySelect.appendChild(opt);
        });
        citySelect.disabled = false;
    } else {
        citySelect.disabled = true;
    }
});

citySelect.disabled = true;
govSelect.value = "";

/* =========================================
   MOBILE MENU
========================================= */
window.toggleMobileMenu = function (e) {
    if (e) e.preventDefault();
    const menu = document.getElementById("mobileMenu");
    const overlay = document.getElementById("menuOverlay");
    menu.classList.toggle("active");
    overlay.classList.toggle("active");
    document.body.style.overflow = menu.classList.contains("active") ? "hidden" : "";
};

window.closeMobileMenu = function () {
    document.getElementById("mobileMenu").classList.remove("active");
    document.getElementById("menuOverlay").classList.remove("active");
    document.body.style.overflow = "";
};

/* =========================================
   PRODUCT MODAL
========================================= */
let currentProduct = null;
let selectedRating = 0;

function openProduct(id, name, price, image, sizes = [], description = "", comparePrice = 0) {
    currentProduct = { id, name, price: Number(price), image, sizes, description, comparePrice };
    document.getElementById("modalTitle").textContent = name;
    
    document.getElementById("modalDesc").textContent = description || "منتج فاخر من VANTÉ";
    
    document.getElementById("modalPrice").textContent = Number(price) + " جنيه";
    document.getElementById("modalImg").src = image;
    document.getElementById("modalImg").alt = name;
    const sizeSelect = document.getElementById("modalSize");
    sizeSelect.innerHTML = "";
    (sizes.length ? sizes : ["7", "8", "9"]).forEach(size => {
        sizeSelect.innerHTML += `<option value="${size}">${size}</option>`;
    });
    document.getElementById("reviewText").value = "";
    document.getElementById("reviewText").style.display = "none";
    selectedRating = 0;
    document.querySelectorAll(".rating-stars span").forEach(star => star.classList.remove("active"));
    document.getElementById("productModal").classList.add("active");
    document.getElementById("overlay").classList.add("active");
    document.body.classList.add("modal-open");
}

window.closeProduct = function () {
    document.getElementById("productModal").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
    document.body.classList.remove("modal-open");
};

window.addCurrentProductToCart = function(event) {
    if (event) event.stopPropagation();
    if (!currentProduct) { alert("خطأ في تحميل المنتج"); return; }
    const size = document.getElementById("modalSize")?.value || "7";
    addToCart(currentProduct.name, Number(currentProduct.price), size, currentProduct.image);
    updateCart();
    closeProduct();
    openCart();
};

document.querySelectorAll(".rating-stars span").forEach((star, index) => {
    star.addEventListener("click", function() {
        selectedRating = index + 1;
        document.querySelectorAll(".rating-stars span").forEach((s, i) => s.classList.toggle("active", i < selectedRating));
        document.getElementById("reviewText").style.display = "block";
    });
});

window.submitReview = async function() {
    if (!currentProduct || selectedRating === 0) return alert("اختر منتج ونجوم");
    try {
        await addDoc(collection(db, "reviews"), {
            productId: currentProduct.id,
            productName: currentProduct.name,
            rating: selectedRating,
            text: document.getElementById("reviewText").value.trim(),
            createdAt: serverTimestamp()
        });
        alert("تم إرسال تقييمك بنجاح");
        document.getElementById("reviewText").value = "";
        document.getElementById("reviewText").style.display = "none";
        selectedRating = 0;
        document.querySelectorAll(".rating-stars span").forEach(star => star.classList.remove("active"));
    } catch (error) { console.error(error); alert("خطأ"); }
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCotT8EP2uy_HsgHknxeGBorKoEUORPtmU",
    authDomain: "vante-orders.firebaseapp.com",
    projectId: "vante-orders",
    storageBucket: "vante-orders.firebasestorage.app",
    messagingSenderId: "842319700646",
    appId: "1:842319700646:web:f6afd78ef7038c3be4ca67",
    measurementId: "G-56ZC1RW0T7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentCategory = "all";
let allProducts = [];
const productsContainer = document.querySelector(".products");

const normalize = (str) => (str || "").toString().trim().toLowerCase();

function renderProducts() {
    if (!productsContainer) return;
    const selectedCategory = normalize(currentCategory);
    const filtered = allProducts.filter(p => selectedCategory === "all" ? true : normalize(p.category || "all") === selectedCategory);

    if (filtered.length === 0) {
        productsContainer.innerHTML = `<div style="text-align:center;padding:40px">لا توجد منتجات في هذا القسم</div>`;
        return;
    }

            productsContainer.innerHTML = filtered.map(p => {
            const sizes = Array.isArray(p.sizes) && p.sizes.length ? p.sizes : ["7", "8", "9"];
            const hasDiscount = p.comparePrice && p.comparePrice > p.price;
            const discountBadgeHtml = hasDiscount ? `<span class="discount-badge">-${Math.round((1 - p.price / p.comparePrice) * 100)}%</span>` : '';
            const stock = p.stock >= 0 ? p.stock : null;
            const outOfStock = stock === 0;
            const stockInfo = stock !== null ? `<small>الكمية المتاحة: ${stock}</small>` : '';
            const addBtnDisabled = outOfStock ? 'disabled style="opacity:0.6;cursor:not-allowed"' : '';

            return `
            <div class="product">
                <div class="product-image"
        onclick='openProduct(
            "${p.id}",
            ${JSON.stringify(p.name)},
            ${Number(p.price)},
            ${JSON.stringify(p.image)},
            ${JSON.stringify(sizes)},
            ${JSON.stringify(p.description || "")}
        )'>

        ${discountBadgeHtml}
        <img src="${p.image}" alt="${p.name}">
                </div>
                <h3>${p.name}</h3>
                <div class="price-tag">
                    ${hasDiscount ? `<span style="text-decoration:line-through;color:#999;font-size:14px;">${Number(p.comparePrice)} ج</span>` : ''}
                    <span class="price">${Number(p.price)}</span>
                    <span class="currency">EGP</span>
                </div>
                
                <!-- اختيار المقاس مع عنوان احترافي -->
                <div class="size-selector-wrapper">
                    <label class="size-label-main">المقاس:</label>
                    <select class="size-select" data-product-id="${p.id}">
                        <option value="" disabled selected>اختر المقاس</option>
                        ${sizes.map(s => `<option value="${s}">${s}</option>`).join('')}
                    </select>
                </div>
                
                ${stockInfo}
                <button class="btn-primary add-cart-btn" ${addBtnDisabled} onclick="event.stopPropagation(); window.addToCartFromCard('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${Number(p.price)}, '${p.image}')">
                    ${outOfStock ? 'نفذت الكمية' : 'أضف للسلة'}
                </button>
            </div>`;
        }).join("");
    }

    const productsRef = collection(db, "products");
    onSnapshot(query(productsRef), (snapshot) => {
        allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderProducts();
    });

    // ========== السلة ==========
    let cart = [];
    window.addToCart = function(name, price, size, image) {
        const existing = cart.find(item => item.name === name && item.size === size);
        if (existing) existing.qty += 1;
        else cart.push({ name, price, size, image, qty: 1 });
        updateCart();
    };

    window.addToCartFromCard = function(productId, name, price, image) {
        const select = document.querySelector(`.size-select[data-product-id="${productId}"]`);
        if (!select || !select.value) {
            alert("الرجاء اختيار المقاس أولاً");
            return;
        }
        window.addToCart(name, Number(price), select.value, image);
        updateCart();
        openCart();
    };

    window.updateCart = function() {
        let total = 0, count = 0;
        const html = cart.map((item, index) => {
            total += item.price * item.qty;
            count += item.qty;
            return `<div class="cart-item">
                <div><strong>${item.name}</strong><br><small>${item.size}</small></div>
                <div><button onclick="window.changeQty(${index},-1)">-</button>${item.qty}<button onclick="window.changeQty(${index},1)">+</button></div>
                <div>${item.price * item.qty} ج</div>
            </div>`;
        }).join("");
        document.getElementById("cartItems").innerHTML = cart.length ? html : "السلة فارغة";
        document.getElementById("total").innerText = total;
        document.getElementById("cartCount").innerText = count;
    };

    window.changeQty = function(index, change) {
        cart[index].qty += change;
        if (cart[index].qty <= 0) cart.splice(index, 1);
        updateCart();
    };

    window.openCart = () => { document.getElementById("cartDrawer").classList.add("active"); document.getElementById("overlay").classList.add("active"); };
    window.closeCart = () => { document.getElementById("cartDrawer").classList.remove("active"); document.getElementById("overlay").classList.remove("active"); };
    window.openCheckout = () => { document.getElementById("checkoutModal").classList.add("active"); document.getElementById("overlay").classList.add("active"); };
    window.closeCheckout = () => { document.getElementById("checkoutModal").classList.remove("active"); document.getElementById("overlay").classList.remove("active"); };

    // ========== الدفع ==========
    window.checkout = async function () {
        const btn = document.querySelector("#checkoutModal .btn-primary");
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const gov = document.getElementById("governorate").value;
        const city = document.getElementById("city").value;
        const address = document.getElementById("address").value.trim();

        if (!name || !phone || !gov || !city || !address) {
            alert("يرجى استكمال جميع بيانات الطلب");
            return;
        }
        if (cart.length === 0) {
            alert("السلة فارغة");
            return;
        }

        btn.disabled = true;
        btn.innerText = "جاري إرسال الطلب...";

        try {
            const quantity = cart.reduce((sum, item) => sum + item.qty, 0);
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const shipping = 70;
            const finalTotal = subtotal + shipping;
            const orderID = "V" + Date.now();

            const orderDetails = cart.map(item => ({
                name: item.name,
                size: item.size || "",
                qty: item.qty,
                price: item.price,
                image: item.image || ""
            }));

            const orderData = {
                orderID,
                customerName: name,
                phone,
                gov,
                city,
                address,
                orderDetails,
                quantity,
                subtotal,
                shipping,
                finalTotal,
                status: "new",
                createdAt: serverTimestamp()
            };

            await addDoc(collection(db, "orders"), orderData);

            let message = `🛍️ طلب جديد - VANTÉ\n\n`;
            message += `📦 رقم الطلب: ${orderID}\n`;
            message += `👤 الاسم: ${name}\n`;
            message += `📱 الهاتف: ${phone}\n`;
            message += `📍 المحافظة: ${gov}\n`;
            message += `🏙️ المدينة: ${city}\n`;
            message += `🏠 العنوان: ${address}\n\n`;

            cart.forEach(item => {
                message += `• ${item.name}\n`;
                message += `المقاس: ${item.size}\n`;
                message += `الكمية: ${item.qty}\n`;
                message += `السعر: ${item.price * item.qty} جنيه\n\n`;
            });

            message += `🚚 الشحن: ${shipping} جنيه\n`;
            message += `💰 الإجمالي: ${finalTotal} جنيه`;

            const phoneNumber = "201106018685";
            const encodedMessage = encodeURIComponent(message);
            const appUrl = `whatsapp://send?phone=${phoneNumber}&text=${encodedMessage}`;
            const webUrl = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;

            window.location.href = appUrl;
            setTimeout(() => window.open(webUrl, "_blank"), 1200);

            cart = [];
            updateCart();

            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("governorate").selectedIndex = 0;
            document.getElementById("city").innerHTML = "";
            document.getElementById("address").value = "";

            closeCheckout();
            closeCart();
            alert("تم إرسال طلبك بنجاح ✨");

        } catch (error) {
            console.error(error);
            alert("حدث خطأ أثناء إرسال الطلب.");
        } finally {
            btn.disabled = false;
            btn.innerText = "تأكيد الطلب";
        }
    };

    // ========== القوائم والبحث ==========
    function setCategory(category) {
        currentCategory = category;
        const url = new URL(window.location);
        url.searchParams.set("category", category);
        window.history.pushState({}, "", url);
        document.querySelectorAll("[data-category]").forEach(l => l.classList.remove("active"));
        document.querySelectorAll(`[data-category="${category}"]`).forEach(l => l.classList.add("active"));
        renderProducts();
    }

    window.handleMenuClick = (e, category) => { e.preventDefault(); setCategory(category); };
    window.toggleCollections = (e) => { e.preventDefault(); e.stopPropagation(); document.getElementById("collectionsSub").classList.toggle("active"); };
    window.openSearch = () => { 
    document.getElementById("stickySearch").classList.add("active"); 
    const input = document.getElementById("searchInput");
    input.focus();
    input.value = ''; // تنظيف الحقل عند الفتح
    renderProducts(); // عرض كل المنتجات عند الفتح
};
window.closeSearch = () => { 
    document.getElementById("stickySearch").classList.remove("active"); 
    document.getElementById("searchInput").value = '';
    renderProducts(); // إظهار جميع المنتجات بعد الإغلاق
};
    window.searchProducts = () => {
        const filter = document.getElementById("searchInput").value.toLowerCase().trim();
        document.querySelectorAll(".product").forEach(p => {
            const name = p.querySelector("h3").textContent.toLowerCase();
            p.style.display = name.includes(filter) ? "block" : "none";
        });
    };

    window.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        setCategory(params.get("category") || "all");
    });

 // Offer Timer
    const targetTime = Date.now() + 4 * 60 * 60 * 1000;

setInterval(() => {

    const diff = targetTime - Date.now();

    if (diff <= 0) return;

    document.getElementById("h").textContent =
        String(Math.floor(diff / 3600000)).padStart(2,"0");

    document.getElementById("m").textContent =
        String(Math.floor(diff % 3600000 / 60000)).padStart(2,"0");

    document.getElementById("s").textContent =
        String(Math.floor(diff % 60000 / 1000)).padStart(2,"0");

}, 1000);
</script>

</body>
