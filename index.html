<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VANTÉ | Minimal Luxury</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#fff;
    color:#111;
}

/* OFFER BAR */
.offer-bar{
    background:#000;
    color:#D4AF37;
    padding:12px;
    text-align:center;
    font-weight:700;
}

/* HEADER */
.main-header{
    background:#000;
    color:#fff;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:999;
}

.brand-logo h1{
    margin:0;
    font-size:28px;
    background:linear-gradient(45deg,#D4AF37,#FFD700);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header-icons button{
    background:rgba(255,255,255,.1);
    border:none;
    color:#fff;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
    position:relative;
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    background:#D4AF37;
    color:#000;
    width:18px;
    height:18px;
    font-size:12px;
    border-radius:50%;
}

/* PRODUCTS */
.container{padding:20px; max-width:900px; margin:auto;}

.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.product{
    border:1px solid #eee;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.product img{width:100%; border-radius:10px;}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#000;
    color:#fff;
    margin-top:10px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#D4AF37;
    color:#000;
}

/* CART */
.cart-item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #eee;
}

.total{
    text-align:center;
    font-size:22px;
    margin-top:15px;
    color:#D4AF37;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
}

    .drawer{
    position:fixed;
    top:0;
    right:-100%;
    width:320px;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 30px rgba(0,0,0,.2);
    padding:20px;
    transition:.3s;
    z-index:1000;
}

.drawer.active{
    right:0;
}

.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:#fff;
    padding:20px;
    width:90%;
    max-width:400px;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
    border-radius:15px;
    transition:.3s;
    z-index:2000;
}

.modal.active{
    transform:translate(-50%,-50%) scale(1);
}

#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    display:none;
    z-index:900;
}

#overlay.active{
    display:block;
}
    
</style>
</head>

<body>

<!-- OFFER -->
<div class="offer-bar">
🔥 خصم 10% لفترة محدودة
</div>

<!-- HEADER -->
<header class="main-header">

<div class="header-icons">
<button onclick="openCart()">
<i class="fas fa-shopping-bag"></i>
<span class="cart-count" id="cartCount">0</span>
</button>
</div>

<div class="brand-logo">
<h1>VANTÉ</h1>
</div>

</header>

<!-- PRODUCTS -->
<section class="container">

<h2>المنتجات</h2>

<div class="products">

<div class="product">
<img src="images/p1.webp">
<h3>سوار كارتير</h3>
<p>249 جنيه</p>

<select id="size1">
<option>16cm</option>
<option>18cm</option>
<option>20cm</option>
</select>

<button onclick="addToCart('سوار كارتير',249,document.getElementById('size1').value,'images/p1.webp')">
أضف للسلة
</button>
</div>

<div class="product">
<img src="images/p2.webp">
<h3>خاتم كارتير</h3>
<p>199 جنيه</p>

<select id="size2">
<option>7</option>
<option>8</option>
<option>9</option>
</select>

<button onclick="addToCart('خاتم كارتير',199,document.getElementById('size2').value,'images/p2.webp')">
أضف للسلة
</button>
</div>

</div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  authDomain: "YOUR-DOMAIN",
  projectId: "YOUR-ID",
  storageBucket: "YOUR-BUCKET",
  messagingSenderId: "YOUR-ID",
  appId: "YOUR-APP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CART */
let cart = [];

/* ADD TO CART */
window.addToCart = function(name, price, size, image){

    let existing = cart.find(item =>
        item.name === name && item.size === size
    );

    if(existing){
        existing.qty += 1;
    } else {
        cart.push({
            name,
            price,
            size,
            image,
            qty:1
        });
    }

    updateCart();
    openCart(); // 🛒 يفتح تلقائي
}


/* UPDATE CART UI */
function updateCart(){

    let html = "";
    let total = 0;

    cart.forEach((item,i)=>{

        total += item.price * item.qty;

        html += `
        <div class="cart-item">

            <div>
                <b>${item.name}</b><br>
                ${item.size}
            </div>

            <div style="display:flex;align-items:center;gap:10px">

                <button onclick="changeQty(${i},-1)">-</button>

                <span>${item.qty}</span>

                <button onclick="changeQty(${i},1)">+</button>

            </div>

            <div>
                ${item.price * item.qty} ج
            </div>

        </div>`;
    });

    document.getElementById("cartItems").innerHTML =
        cart.length ? html : "السلة فارغة";

    document.getElementById("total").innerText = total;
    document.getElementById("cartCount").innerText = cart.length;
}


/* CHANGE QTY */
window.changeQty = function(index, value){

    cart[index].qty += value;

    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }

    updateCart();
}


/* OPEN CART */
window.openCart = function(){
    document.getElementById("cartDrawer").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}


/* CLOSE CART */
window.closeCart = function(){
    document.getElementById("cartDrawer").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

   window.openCheckout = function(){
    document.getElementById("checkoutModal").classList.add("active");
}

   window.closeCheckout = function(){
    document.getElementById("checkoutModal").classList.remove("active");
}

window.checkout = async function(){

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;

    if(!name || !phone || !address){
        alert("املأ البيانات");
        return;
    }

    const order = {
        name,
        phone,
        address,
        cart,
        total: cart.reduce((a,b)=>a+b.price,0),
        createdAt: new Date()
    };

    await addDoc(collection(db,"orders"),order);

    let msg = `طلب جديد\n${name}\n${phone}\n${address}\n`;

    cart.forEach(i=>{
        msg += `\n${i.name} - ${i.size} - ${i.price}`;
    });

    window.open(`https://wa.me/201106018685?text=${encodeURIComponent(msg)}`);

    alert("تم الطلب");

    cart = [];
    updateCart();
}

</script>
    
<div id="cartDrawer" class="drawer">
    <h2>🛒 سلة التسوق</h2>

    <div id="cartItems"></div>

    <div class="total">
        الإجمالي: <span id="total">0</span> جنيه
    </div>

    <button onclick="openCheckout()">تأكيد الطلب</button>
    <button onclick="closeCart()">إغلاق</button>
</div>

<div id="overlay" onclick="closeCart()"></div>

<div id="checkoutModal" class="modal">

    <h2>إتمام الطلب</h2>

    <input id="name" placeholder="الاسم">
    <input id="phone" placeholder="الهاتف">
    <input id="address" placeholder="العنوان">

    <button onclick="checkout()">إرسال الطلب</button>
    <button onclick="closeCheckout()">رجوع</button>

</div>
    
</body>
</html>
