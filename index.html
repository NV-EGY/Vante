<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTÉ | Minimal Luxury</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
/* ====================================
   RESET
==================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Cairo',sans-serif;
    background:#ffffff;
    color:#111111;
    line-height:1.6;
    overflow-x:hidden;
}

img{
    max-width:100%;
    display:block;
}

a{
    text-decoration:none;
}

button,
input,
select{
    font-family:inherit;
    outline:none;
}

/* ====================================
   TOP OFFER BAR
==================================== */
.top-offer{
    background:#000;
    color:#D4AF37;
    padding:14px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    flex-wrap:wrap;
    text-align:center;
    font-size:14px;
    font-weight:700;
    border-bottom:1px solid rgba(212,175,55,.2);
}

.offer-text{
    letter-spacing:.5px;
}

.offer-timer{
    display:flex;
    align-items:center;
    gap:8px;
    direction:ltr;
    color:#fff;
    font-weight:700;
}

.offer-timer span{
    background:#D4AF37;
    color:#000;
    min-width:38px;
    padding:7px 10px;
    border-radius:10px;
    font-weight:900;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 15px rgba(212,175,55,.35);
}

/* ====================================
   NAVBAR
==================================== */
.nav-bar{
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:72px;
    padding:0 35px;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
    direction:ltr;
}

.logo{
    grid-column:1;
    justify-self:start;
    font-size:30px;
    font-weight:900;
    letter-spacing:3px;
    cursor:pointer;
    background:linear-gradient(135deg,#D4AF37,#FFD700,#B8860B);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    line-height:1;
}

.menu{
    grid-column:2;
    justify-self:center;
    display:flex;
    align-items:center;
    gap:28px;
    transform: translateX(-80px);
}

.menu a{
    color:#111;
    font-size:14.5px;
    font-weight:700;
    transition:.3s;
    position:relative;
    line-height:1;
    padding:6px 2px;
}

.menu a::after{
    content:'';
    position:absolute;
    bottom:-6px;
    right:0;
    width:0;
    height:2px;
    background:#D4AF37;
    transition:.3s;
}

.menu a:hover{
    color:#D4AF37;
}

.menu a:hover::after{
    width:100%;
}

.icons{
    grid-column:3;
    justify-self:end;
    display:flex;
    align-items:center;
    gap:10px;
}

.icons button{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:#111;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.3s;
    position:relative;
}

.icons button:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
}

.icons i{
    font-size:16px;
}

.cart-count{
    position:absolute;
    top:-6px;
    right:-6px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#D4AF37;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    border:2px solid #fff;
}

/* ====================================
   HERO
==================================== */
.hero{
    width:100%;
    overflow:hidden;
    line-height:0;
    background:#fff;
}

.hero img{
    width:100%;
    height:auto;
    object-fit:cover;
}

/* ====================================
   PRODUCTS
==================================== */
.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.container h2{
    text-align:center;
    margin-bottom:40px;
    font-size:34px;
    color:#111;
}

.modal-close{
    position: absolute;
    top: 18px;
    left: 18px;
    width: 48px;
    height: 48px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.96);
    color: #111;
    font-size: 26px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    transition: all 0.3s ease;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.modal-close:hover{
    background: #111;
    color: #fff;
    transform: rotate(90deg) scale(1.08);
    box-shadow: 0 18px 40px rgba(0,0,0,0.28);
}

.modal-close:active{
    transform: rotate(90deg) scale(0.95);
}

.modal-product-img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}
.modal-info {
    padding: 0 5px;
}
.modal-desc {
    color: #555;
    line-height: 1.9;
    font-size: 15px;
    margin-bottom: 18px;
    text-align: center;
}
.modal-price-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}
.modal-price {
    color: #D4AF37;
    font-size: 24px;
    font-weight: 900;
}
.modal-old-price {
    text-decoration: line-through;
    color: #999;
    font-size: 16px;
}
.modal-add-btn {
    width: 100%;
    margin-bottom: 15px;
    background: #111;
    color: #fff;
}
.modal-add-btn:hover {
    background: #D4AF37;
}
#reviewText {
    display: none; /* سيظهر بالجافاسكريبت */
    width: 100%;
    min-height: 100px;
    margin: 15px 0;
    padding: 15px;
    border: 1px solid #eee;
    border-radius: 12px;
    resize: vertical;
}

.product {
    background: #fff;
    border: none;
    border-radius: 24px;
    padding: 20px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
}
.product:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.08);
}

.product-image{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    cursor:pointer;
    margin-bottom:18px;
}

.product-image img{
    width:100%;
    transition:.5s;
}

.product:hover .product-image img{
    transform:scale(1.06);
}

.product-gallery{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px 0 20px;
}

.product-gallery img{
    width:65px;
    height:65px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    border:2px solid #eee;
    transition:.3s;
}

.product-gallery img:hover{
    border-color:#D4AF37;
    transform:translateY(-3px);
}


/* شارة الخصم */
.discount-badge {
    position: absolute;
    top: 2px;
    left: 2px;
    background: #D4AF37;
    color: #000;
    padding: 5px 10px;
    border-radius: 17px;
    font-size: 10px; /* أصغر قليلاً لتتسع OFF */
    font-weight: 900;
    z-index: 10;
    box-shadow: 0 4px 11px rgba(0,0,0,0.2);
    letter-spacing: 0.5px;
}

/* اختيار المقاس في الكارد */
        /* تعديل شكل اختيار المقاس على الواجهة */
        .size-select {
            width: 100%;
            padding: 12px 15px;
            margin-top: 12px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23111' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: left 15px center;
        }
        .size-select:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

.add-cart-btn{
    margin-top:15px;
    font-size:16px;
    font-weight:800;
    letter-spacing:.3px;
}
      
.btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#000;
    color:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.btn-primary:hover{
    background:#D4AF37;
    color:#000;
}

.btn-secondary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#f2f2f2;
    color:#111;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.25s ease;
    margin-top:10px;
}

.btn-secondary:hover{
    background:#ddd;
}

.cart-item button{
    width:32px;
    height:32px;
    border-radius:8px;
    border:none;
    background:#111;
    color:#fff;
    cursor:pointer;
}

.cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    border-bottom: 1px solid #f0f0f0;
    gap: 12px;
}
.cart-item:last-child {
    border-bottom: none;
}
.cart-item-details {
    flex: 1;
}
.cart-item-details strong {
    display: block;
    font-size: 15px;
    margin-bottom: 4px;
}
.cart-item-details small {
    color: #888;
    font-size: 13px;
}
.cart-item-price {
    font-weight: 800;
    font-size: 16px;
    color: #D4AF37;
    min-width: 70px;
    text-align: left;
}

/* =========================================
   REVIEW SECTION
========================================= */

#reviewText{
    width:100%;
    min-height:120px;
    margin-top:18px;
    padding:18px;
    border:1px solid #e5e5e5;
    border-radius:18px;
    resize:none;
    font-size:15px;
    line-height:1.8;
    background:#fafafa;
}

#reviewText:focus{
    border-color:#D4AF37;
    background:#fff;
}

.review-label{
    text-align:right;
    margin:18px 0 8px;
    font-size:15px;
    font-weight:700;
    color:#222;
}

.review-submit{
    width:auto;
    min-width:180px;
    padding:13px 28px;
    margin:20px auto 0;
    display:block;
    border-radius:14px;
    font-size:14px;
    font-weight:800;
}

.modal-cart-btn{
    width:auto;
    min-width:220px;
    padding:14px 32px;
    margin:18px auto;
    display:block;
    border-radius:14px;
    font-size:15px;
    font-weight:800;
}

/* ====================================
   CART DRAWER
==================================== */
.drawer{
    position:fixed;
    top:0;
    right:-100%;
    width:380px;
    max-width:100%;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 40px rgba(0,0,0,.2);
    padding:25px;
    transition:.35s ease;
    z-index:2000;
    overflow-y:auto;
}

.drawer.active{
    right:0;
}

.total{
    text-align:center;
    font-size:24px;
    margin:25px 0;
    color:#D4AF37;
    font-weight:900;
}

/* ====================================
   MODAL
==================================== */
.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(.8);
    width:90%;
    max-width:450px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,.3);
    z-index:3000;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.modal.active{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
    visibility:visible;
}

.modal h2{
    text-align:center;
    margin-bottom:25px;
}

.modal input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

.modal-size{
    margin:22px 0;
    text-align:right;
}

.modal-size label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:800;
    color:#111;
}

.size-label{
    margin:10px 0;
    font-size:13px;
    color:#555;
    font-weight:700;
}

.sizes-text{
    color:#D4AF37;
    font-weight:900;
    margin-right:5px;
    letter-spacing:1px;
}

.sizes-wrap{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:12px 0;
}

.size-btn{
    width:38px;
    height:38px;
    border:1px solid #ddd;
    background:#fff;
    border-radius:10px;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    transition:.25s ease;
}

.size-btn:hover{
    border-color:#D4AF37;
    transform:translateY(-2px);
}

.size-btn.active{
    background:#111;
    color:#fff;
    border-color:#111;
}

.price-tag{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:6px;
    margin:6px 0 10px;
}

.price{
    font-size:18px;
    font-weight:900;
    color:#111;
}

.currency{
    font-size:12px;
    font-weight:700;
    color:#D4AF37;
    letter-spacing:1px;
}

body.modal-open{
    overflow:hidden;
}

.stars{
    margin-top:28px;
    margin-bottom:15px;
    text-align:center;
    font-size:34px;
}

.stars i{
    cursor:pointer;
    color:#ddd;
    transition:.25s;
}

.stars i.active,
.stars i:hover{
    color:#FFD700;
    transform:scale(1.12);
}

.review-submit:disabled{
    opacity:.45;
    cursor:not-allowed;
    transform:none;
}      

.modal-size select{
    width:100%;
    padding:14px 18px;
    border:1px solid #ddd;
    border-radius:14px;
    font-size:15px;
    background:#fff;
    cursor:pointer;
    outline:none;
    transition:.3s;
}

.modal-size select:focus{
    border-color:#D4AF37;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:1500;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

#overlay.active{
    opacity:1;
    visibility:visible;
}

.checkout-modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.95) translateY(20px);
    width: 92%; max-width: 400px;
    background: #fff; border-radius: 24px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.15);
    z-index: 99999; opacity: 0; visibility: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
}
.checkout-modal.active {
    opacity: 1; visibility: visible;
    transform: translate(-50%, -50%) scale(1) translateY(0);
}
.checkout-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 24px; border-bottom: 1px solid #f0f0f0;
}
.checkout-header h2 {
    font-size: 22px; font-weight: 800; margin: 0;
}
.close-modal {
    width: 38px; height: 38px; border-radius: 50%;
    border: none; background: #f5f5f5; font-size: 20px;
    cursor: pointer; transition: 0.3s;
    display: flex; align-items: center; justify-content: center;
}
.close-modal:hover { background: #111; color: #fff; }

.checkout-body {
    padding: 24px;
}
.input-group {
    margin-bottom: 16px;
}
.input-group label {
    display: block; margin-bottom: 6px;
    font-size: 13px; font-weight: 700; color: #222;
}
.input-icon {
    position: relative;
    display: flex; align-items: center;
}
.input-icon i {
    position: absolute; right: 15px;
    color: #888; font-size: 14px; pointer-events: none;
}
.input-icon input,
.input-icon select {
    width: 100%; height: 48px;
    padding: 0 45px 0 15px;
    border: 1.5px solid #e5e5e5; border-radius: 14px;
    font-size: 14px; background: #fff; outline: none;
    transition: 0.3s; font-family: 'Cairo', sans-serif;
}
.input-icon input:focus,
.input-icon select:focus {
    border-color: #D4AF37;
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
}
.checkout-btn {
    width: 100%; height: 48px; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary.checkout-btn {
    background: #111; color: #fff; margin-bottom: 12px;
}
.btn-primary.checkout-btn:hover {
    background: #D4AF37; transform: translateY(-2px);
}
.btn-secondary.checkout-btn {
    background: #f5f5f5; color: #111;
}
.btn-secondary.checkout-btn:hover {
    background: #e0e0e0;
}

.product-description{
    margin:15px 0;
    color:#666;
    line-height:1.9;
    font-size:15px;
}

.custom-select-wrapper {
    position: relative;
}

.custom-select-wrapper select {
    appearance: none;
    padding-left: 55px;
    cursor: pointer;
}

.select-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
}

.custom-select-wrapper::after {
    content: "⌄";
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    color: #777;
    pointer-events: none;
}

.btn-primary,
.btn-secondary {
    width: 100%;
    height: 58px;
    border: none;
    border-radius: 18px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: .3s;
}

.btn-primary {
    background: #111;
    color: #fff;
    margin-bottom: 14px;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(0,0,0,.18);
}

.btn-secondary {
    background: #f5f5f5;
    color: #111;
}

.btn-secondary:hover {
    background: #ececec;
}

@media (max-width: 480px) {
    .checkout-header,
    .checkout-body {
        padding: 24px;
    }

    .checkout-header h2 {
        font-size: 24px;
    }
}

.mobile-actions,
.mobile-menu {
    display: none;
}

@media (max-width: 768px) {
    .nav-bar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:15px 18px;
        direction:ltr;
    }

    .mobile-actions{
        display:block;
        order:1;
    }

    .logo{
        order:2;
        font-size:28px;
        margin:0 auto;
    }

    .icons{
        order:3;
        display:flex;
        align-items:center;
        gap:0;
    }

    .menu{
        display:none !important;
    }

    .icons button:not(:last-child){
        display:none;
    }

    .mobile-btn{
        width:46px;
        height:46px;
        border:none;
        border-radius:50%;
        background:#111;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        font-size:18px;
    }

    .mobile-menu{
        display:flex;
        flex-direction:column;
        position:fixed;
        top:0;
        left:-100%;
        right:auto;
        width:320px;
        max-width:85%;
        height:100vh;
        background:#fff;
        padding:25px;
        z-index:5000;
        box-shadow:-10px 0 40px rgba(0,0,0,.25);
        transition:.4s ease;
    }

    .mobile-menu.active{
        left:0;
    }

    .mobile-menu-header{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom:30px;
        padding-bottom:20px;
        border-bottom:1px solid #eee;
    }

    .mobile-header-icons{
        display:flex;
        gap:12px;
    }
  
.mobile-icons-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
    margin-top:15px;
    padding:10px 5px;
}
  
    .mobile-icon{
        width:48px;
        height:48px;
        border:none;
        border-radius:50%;
        background:#111;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:18px;
    }

    .mobile-icon:hover{
        background:#D4AF37;
        color:#000;
        transform:translateY(-2px);
    }
  
    .close-menu{
      position:absolute;
        top:0;
        right:0;
        width:46px;
        height:46px;
        border:none;
        border-radius:50%;
        background:#f5f5f5;
        color:#111;
        box-shadow:none;

    // ========== السلة ==========
    let cart = [];
    window.addToCart = function(name, price, size, image) {
        // نجيب بيانات المنتج من الذاكرة عشان نعرف المخزون الحقيقي
        const product = allProducts.find(p => p.name === name);
        const availableStock = (() => {
    if (!product || !product.stockBySize) return -1;
    return product.stockBySize[size] !== undefined ? product.stockBySize[size] : -1;
})(); // -1 يعني "غير محدد"

        // لو الكمية محددة (يعني مش سالب أو null)
        if (availableStock >= 0) {
            const currentQtyInCart = cart.reduce((sum, item) => {
                return item.name === name ? sum + item.qty : sum;
            }, 0);

            // اللعبة هنا: لو الكمية اللي في السلة + الكمية اللي عايز يضيفها (1) أكبر من المخزون المتاح
            if (currentQtyInCart + 1 > availableStock) {
                alert(`عفواً، الكمية المتاحة المتبقية هي ${availableStock - currentQtyInCart} قطعة فقط.`);
                return; // امنع الإضافة
            }
        }

        // باقي الدالة زي ما هي
        const existing = cart.find(item => item.name === name && item.size === size);
        if (existing) existing.qty += 1;
        else cart.push({ name, price, size, image, qty: 1 });
        updateCart();
    };

    window.addToCartFromCard = function(productId, name, price, image) {
    const select = document.querySelector(`.size-select[data-product-id="${productId}"]`);

    const product = allProducts.find(p => p.id === productId);
    if (product && product.stockBySize && product.stockBySize[size] !== undefined) {
        const availableForSize = product.stockBySize[size];
        const currentInCart = cart.reduce((sum, item) => 
            (item.name === name && item.size === size) ? sum + item.qty : sum, 0);

            alert(`عفواً، الكمية المتاحة لمقاس ${size} هي ${availableForSize} قطعة فقط.`);

    openCart();
};

    window.updateCart = function() {
    let total = 0, count = 0;
    const html = cart.map((item, index) => {
        total += item.price * item.qty;
        count += item.qty;
        
        // نجيب المخزون المتاح للمنتج عشان نعرف الحد الأقصى
        const product = allProducts.find(p => p.name === item.name);
        const maxStock = (() => {
    if (!product || !product.stockBySize) return -1;
    const sizes = Object.keys(product.stockBySize);
    // إذا كان المنتج له مقاسات، نجمع الكميات المتاحة للمقاس المعين فقط
    if (item.size && product.stockBySize[item.size] !== undefined) {
        return product.stockBySize[item.size];
    }
    return -1;
})();
        const maxedOut = (maxStock !== -1 && item.qty >= maxStock); // هل وصلنا للحد؟
        
        return `<div class="cart-item">

            </div>
            <div class="cart-item-price">${item.price * item.qty} EGP</div>
        </div>`;
    }).join("");
    document.getElementById("cartItems").innerHTML = cart.length ? html : "السلة فارغة";
    document.getElementById("total").innerText = total;
    document.getElementById("cartCount").innerText = count;
};

    window.changeQty = function(index, change) {
    const item = cart[index];
    if (change > 0) {
        const product = allProducts.find(p => p.name === item.name);
        if (product && product.stockBySize && product.stockBySize[item.size] !== undefined) {
            const maxForSize = product.stockBySize[item.size];
            if (item.qty + change > maxForSize) {
                alert(`عفواً، الكمية المتاحة لمقاس ${item.size} هي ${maxForSize} قطعة فقط.`);
                return;
            }
        }
    }
    item.qty += change;
    if (item.qty <= 0) cart.splice(index, 1);
    updateCart();
};

            alert("حدث خطأ أثناء إرسال الطلب.");
        } finally {
            btn.disabled = false;
            btn.innerText = "تأكيد الطلب";
        }
    };

    // ========== القوائم والبحث ==========
    function setCategory(category) {
        currentCategory = category;
        const url = new URL(window.location);
        url.searchParams.set("category", category);
        window.history.pushState({}, "", url);
        document.querySelectorAll("[data-category]").forEach(l => l.classList.remove("active"));
        document.querySelectorAll(`[data-category="${category}"]`).forEach(l => l.classList.add("active"));
        renderProducts();
    }

    window.handleMenuClick = (e, category) => { e.preventDefault(); setCategory(category); };
    window.toggleCollections = (e) => { e.preventDefault(); e.stopPropagation(); document.getElementById("collectionsSub").classList.toggle("active"); };
    window.openSearch = () => { 
    document.getElementById("stickySearch").classList.add("active"); 
    const input = document.getElementById("searchInput");
    input.focus();
    input.value = ''; // تنظيف الحقل عند الفتح
    renderProducts(); // عرض كل المنتجات عند الفتح
};
window.closeSearch = () => { 
    document.getElementById("stickySearch").classList.remove("active"); 
    document.getElementById("searchInput").value = '';
    renderProducts(); // إظهار جميع المنتجات بعد الإغلاق
};
    window.searchProducts = () => {

 // Offer Timer

setInterval(() => {

    const diff = targetTime - Date.now();

    if (diff <= 0) return;

    document.getElementById("h").textContent =
        String(Math.floor(diff / 3600000)).padStart(2,"0");

    document.getElementById("m").textContent =

    document.getElementById("s").textContent =

// استبدال alert التقليدية بنظام Toast فاخر
const originalAlert = window.alert;
window.alert = function(message, type = 'success') {
    // إزالة أي toast موجود مسبقاً
    const existingToast = document.querySelector('.vante-toast');
    if (existingToast) existingToast.remove();

    const toast = document.createElement('div');
    toast.className = `vante-toast ${type}`;
    toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);

    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
};
// مستمع تغيير المقاس على الواجهة الرئيسية
document.addEventListener('change', function(e) {
    if (e.target.classList.contains('size-select')) {
        const productId = e.target.dataset.productId;
        const selectedSize = e.target.value;
        const product = allProducts.find(p => p.id === productId);
        const stockEl = document.getElementById(`stock-${productId}`);
        if (product && stockEl) {
            const stockBySize = product.stockBySize || {};
            const stock = stockBySize[selectedSize] !== undefined ? stockBySize[selectedSize] : null;
            if (stock !== null) {
                if (stock > 0) {
                    stockEl.innerHTML = `<span style="color:#27ae60; font-weight:600;">متوفر: ${stock} قطعة</span>`;
                } else {
                    stockEl.innerHTML = `<span style="color:#c0392b; font-weight:700;">🚫 نفذت الكمية</span>`;
                }
            } else {
                stockEl.innerHTML = `<span style="color:#B8860B;">كمية غير محددة</span>`;
            }
        }
    }
});

// ========== دوال المودال (تنقل هنا) ==========
window.openProduct = function(id, name, price, image, sizes = [], description = "") {
    const product = allProducts.find(p => p.id === id);
    const stockBySize = product ? product.stockBySize || {} : {};
    currentProduct = { id, name, price: Number(price), image, sizes, description, stockBySize };
    
    document.getElementById("modalTitle").textContent = name;
    document.getElementById("modalDesc").textContent = description || "منتج فاخر من VANTÉ";
    document.getElementById("modalPrice").textContent = Number(price) + " جنيه";
    document.getElementById("modalImg").src = image;
    
    const sizeSelect = document.getElementById("modalSize");
    sizeSelect.innerHTML = "";
    sizes.forEach(size => {
        const qty = stockBySize[size] !== undefined ? stockBySize[size] : null;
        let label = `مقاس: ${size}`;
        if (qty !== null) {
            if (qty > 0) {
                label += ` (باقى ${qty} قطعه)`;
            } else {
                label += ` (نفذت الكميه)`;
            }
        }
        sizeSelect.innerHTML += `<option value="${size}">${label}</option>`;
    });
    
    updateModalStockDisplay();
    sizeSelect.onchange = updateModalStockDisplay; // استخدام onchange بدلاً من addEventListener لتجنب التراكم

    document.getElementById("reviewText").value = "";
    document.getElementById("reviewText").style.display = "none";
    selectedRating = 0;
    document.querySelectorAll(".rating-stars span").forEach(s => s.classList.remove("active"));
    document.getElementById("productModal").classList.add("active");
    document.getElementById("overlay").classList.add("active");
    document.body.classList.add("modal-open");
};

window.updateModalStockDisplay = function() {
    const sizeSelect = document.getElementById("modalSize");
    if (!sizeSelect || !currentProduct) return;
    const selectedSize = sizeSelect.value;
    const stock = currentProduct.stockBySize[selectedSize] !== undefined ? currentProduct.stockBySize[selectedSize] : null;
    const addBtn = document.querySelector('.modal-add-btn');
    const stockInfoEl = document.getElementById("modalStockInfo");
    
    if (stockInfoEl) {
        if (stock !== null) {
            if (stock > 0) {
                stockInfoEl.innerHTML = `<span style="color:#27ae60; font-weight:600;"><i class="fas fa-check-circle"></i> متوفر: ${stock} قطعة</span>`;
            } else {
                stockInfoEl.innerHTML = `<span style="color:#c0392b; font-weight:700;"><i class="fas fa-times-circle"></i> 🚫 نفذت كمية المقاس</span>`;
            }
        } else {
            stockInfoEl.innerHTML = `<span style="color:#B8860B; font-weight:600;"><i class="fas fa-boxes"></i> كمية غير محددة</span>`;
        }
    }
    
    if (stock !== null && stock <= 0) {
        addBtn.disabled = true;
        addBtn.innerHTML = '🚫 نفذت الكمية';
        addBtn.style.background = '#ccc';
        addBtn.style.color = '#666';
        addBtn.style.cursor = 'not-allowed';
    } else {
        addBtn.disabled = false;
        addBtn.innerHTML = '<i class="fas fa-shopping-bag"></i> أضف للسلة';
        addBtn.style.background = '#111';
        addBtn.style.color = '#fff';
        addBtn.style.cursor = 'pointer';
    }
};
