<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VANTÉ | Minimal Luxury</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#fff;
    color:#111;
}

/* OFFER BAR */
.offer-bar{
    background:linear-gradient(90deg,#000,#111,#000);
    color:#fff;
    padding:12px 15px;
    text-align:center;
    border-bottom:1px solid rgba(212,175,55,.25);
}

.offer-content{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.offer-text{
    font-size:15px;
    font-weight:700;
    color:#D4AF37;
}

.countdown{
    background:rgba(212,175,55,.12);
    border:1px solid rgba(212,175,55,.35);
    padding:8px 18px;
    border-radius:50px;
    font-size:18px;
    font-weight:800;
    letter-spacing:2px;
    color:#fff;
}

/* HEADER */
.main-header{
    background:#000;
    color:#fff;
    padding:18px 25px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.brand-logo{
    flex:1;
    text-align:center;
}

.brand-logo h1{
    margin:0;
    font-size:38px;
    font-weight:900;
    letter-spacing:4px;
    background:linear-gradient(45deg,#D4AF37,#FFD700,#E6C35C);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.brand-logo span{
    display:block;
    margin-top:4px;
    font-size:11px;
    letter-spacing:4px;
    color:#d6d6d6;
}

.header-icons{
    display:flex;
    align-items:center;
    gap:12px;
}

.icon-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    color:#fff;
    cursor:pointer;
    transition:.3s;
    position:relative;
    font-size:18px;
}

.icon-btn:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:#D4AF37;
    color:#000;
    font-size:12px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CONTENT */
.container{
    padding:20px;
    max-width:900px;
    margin:auto;
}

.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.product{
    background:#fff;
    border-radius:20px;
    padding:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
    text-align:center;
    transition:.3s;
}

.product:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 45px rgba(0,0,0,.12);
}

.product img{
    width:100%;
    border-radius:15px;
}

.product h3{
    margin:15px 0 8px;
    font-size:20px;
}

.product p{
    color:#D4AF37;
    font-size:22px;
    font-weight:800;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#000,#222);
    color:#fff;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    margin-top:10px;
    font-size:16px;
}

button:hover{
    background:linear-gradient(45deg,#D4AF37,#b8962f);
    color:#000;
}

.cart{
    background:#fafafa;
    padding:20px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.total{
    font-size:24px;
    font-weight:800;
    color:#D4AF37;
    margin-top:20px;
    text-align:center;
}

input,select{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:16px;
    box-sizing:border-box;
}

/* MOBILE */
@media(max-width:768px){

    .main-header{
        padding:15px;
    }

    .brand-logo h1{
        font-size:28px;
        letter-spacing:2px;
    }

    .brand-logo span{
        font-size:9px;
        letter-spacing:2px;
    }

    .icon-btn{
        width:42px;
        height:42px;
        font-size:16px;
    }

    .countdown{
        font-size:16px;
        padding:7px 14px;
    }

    .products{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- شريط العرض -->
<div class="offer-bar">
    <div class="offer-content">
        <span class="offer-text">🔥 خصم 10% لفترة محدودة على جميع منتجات VANTÉ</span>

        <div class="countdown" id="countdown">
            <span id="hours">00</span> :
            <span id="minutes">00</span> :
            <span id="seconds">00</span>
        </div>
    </div>
</div>

<!-- الهيدر -->
<header class="main-header">

    <div class="header-icons">
        <button class="icon-btn" aria-label="تسجيل الدخول">
            <i class="fas fa-user"></i>
        </button>

        <button class="icon-btn" aria-label="بحث">
            <i class="fas fa-search"></i>
        </button>

        <button class="icon-btn" aria-label="السلة">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count" id="cartCount">0</span>
        </button>
    </div>

    <div class="brand-logo">
        <h1>VANTÉ</h1>
        <span>MINIMAL LUXURY</span>
    </div>

</header>

<!-- المنتجات -->
<section class="container">
    <h2 style="text-align:center;margin-bottom:30px;">أحدث المنتجات</h2>

    <div class="products">

        <!-- منتج 1 -->
        <div class="product">
            <img src="images/p1.webp" alt="Bracelet">

            <h3>سوار كارتير فاخر</h3>
            <p>249 جنيه</p>

            <select id="size1">
                <option value="16cm">16cm</option>
                <option value="18cm">18cm</option>
                <option value="20cm">20cm</option>
            </select>

            <button onclick="addToCart('سوار كارتير فاخر',249,document.getElementById('size1').value)">
                أضف للسلة
            </button>
        </div>

        <!-- منتج 2 -->
        <div class="product">
            <img src="images/p2.webp" alt="Ring">

            <h3>خاتم كارتير أنيق</h3>
            <p>199 جنيه</p>

            <select id="size2">
                <option value="7">مقاس 7</option>
                <option value="8">مقاس 8</option>
                <option value="9">مقاس 9</option>
            </select>

            <button onclick="addToCart('خاتم كارتير',199,document.getElementById('size2').value)">
                أضف للسلة
            </button>
        </div>

    </div>
</section>

<!-- السلة -->
<section class="container">
    <h2 style="text-align:center;">🛒 سلة التسوق</h2>

    <div class="cart" id="cartItems">
        <p style="text-align:center;color:#999;">السلة فارغة</p>
    </div>

    <div class="total">
        الإجمالي: <span id="total">0</span> جنيه
    </div>
</section>

<!-- نموذج الطلب -->
<section class="container">
    <h2 style="text-align:center;">إتمام الطلب</h2>

    <input type="text" id="name" placeholder="الاسم بالكامل">
    <input type="tel" id="phone" placeholder="رقم الهاتف">
    <input type="text" id="address" placeholder="العنوان بالكامل">

    <button onclick="checkout()">تأكيد الطلب الآن</button>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "PUT-YOUR-API-KEY",
    authDomain: "YOUR-PROJECT.firebaseapp.com",
    projectId: "YOUR-PROJECT-ID",
    storageBucket: "YOUR-PROJECT.appspot.com",
    messagingSenderId: "YOUR-ID",
    appId: "YOUR-APP-ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.cart = [];

/* إضافة للسلة */
window.addToCart = function(name, price, size) {

    const existing = cart.find(
        item => item.name === name && item.size === size
    );

    if (existing) {
        existing.qty++;
    } else {
        cart.push({
            name,
            price,
            size,
            qty: 1
        });
    }

    renderCart();
};

/* تحديث السلة */
function renderCart() {

    const cartBox = document.getElementById("cartItems");
    const cartCount = document.getElementById("cartCount");

    if (cart.length === 0) {
        cartBox.innerHTML = `
            <p style="text-align:center;color:#999;">
                السلة فارغة
            </p>
        `;
        document.getElementById("total").innerText = 0;
        cartCount.innerText = 0;
        return;
    }

    let total = 0;
    let itemsCount = 0;
    let html = "";

    cart.forEach((item, index) => {

        const itemTotal = item.price * item.qty;
        total += itemTotal;
        itemsCount += item.qty;

        html += `
            <div class="cart-item">
                <div>
                    <strong>${item.name}</strong><br>
                    <small>${item.size} × ${item.qty}</small>
                </div>

                <div>
                    ${itemTotal} ج
                </div>
            </div>
        `;
    });

    cartBox.innerHTML = html;
    document.getElementById("total").innerText = total;
    cartCount.innerText = itemsCount;
}

/* تأكيد الطلب */
window.checkout = async function() {

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();

    if (cart.length === 0) {
        alert("السلة فارغة");
        return;
    }

    if (!name || !phone || !address) {
        alert("يرجى إدخال جميع البيانات");
        return;
    }

    try {

        const total = cart.reduce(
            (sum, item) => sum + item.price * item.qty,
            0
        );

        await addDoc(collection(db, "orders"), {
            customerName: name,
            phone: phone,
            address: address,
            items: cart,
            total: total,
            status: "pending",
            createdAt: serverTimestamp()
        });

        let message = `✨ طلب جديد من VANTÉ\n\n`;
        message += `👤 الاسم: ${name}\n`;
        message += `📞 الهاتف: ${phone}\n`;
        message += `📍 العنوان: ${address}\n\n`;

        cart.forEach(item => {
            message += `• ${item.name}\n`;
            message += `المقاس: ${item.size}\n`;
            message += `الكمية: ${item.qty}\n`;
            message += `السعر: ${item.price * item.qty} ج\n\n`;
        });

        message += `💰 الإجمالي: ${total} جنيه`;

        window.open(
            `https://wa.me/201106018685?text=${encodeURIComponent(message)}`,
            "_blank"
        );

        alert("تم إرسال طلبك بنجاح");

        cart = [];
        renderCart();

        document.getElementById("name").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("address").value = "";

    } catch (error) {
        console.error(error);
        alert("حدث خطأ أثناء إرسال الطلب");
    }
};

/* عداد العرض */
function startCountdown() {

    const target = new Date().getTime() + (24 * 60 * 60 * 1000);

    setInterval(() => {

        const now = new Date().getTime();
        const distance = target - now;

        if (distance <= 0) {
            document.getElementById("countdown").innerHTML = "انتهى العرض";
            return;
        }

        const hours = Math.floor(
            (distance % (1000 * 60 * 60 * 24)) /
            (1000 * 60 * 60)
        );

        const minutes = Math.floor(
            (distance % (1000 * 60 * 60)) /
            (1000 * 60)
        );

        const seconds = Math.floor(
            (distance % (1000 * 60)) / 1000
        );

        document.getElementById("hours").textContent =
            String(hours).padStart(2, "0");

        document.getElementById("minutes").textContent =
            String(minutes).padStart(2, "0");

        document.getElementById("seconds").textContent =
            String(seconds).padStart(2, "0");

    }, 1000);
}

startCountdown();
renderCart();

</script>

</body>
</html>
