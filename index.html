<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#fff;
    color:#111;
}

/* OFFER BAR */
.offer-bar{
    background:linear-gradient(90deg,#000,#111,#000);
    color:#fff;
    padding:12px 15px;
    text-align:center;
    border-bottom:1px solid rgba(212,175,55,.25);
}

.offer-content{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.offer-text{
    font-size:15px;
    font-weight:700;
    color:#D4AF37;
}

.countdown{
    background:rgba(212,175,55,.12);
    border:1px solid rgba(212,175,55,.35);
    padding:8px 18px;
    border-radius:50px;
    font-size:18px;
    font-weight:800;
    letter-spacing:2px;
    color:#fff;
}

/* HEADER */
.main-header{
    background:#000;
    color:#fff;
    padding:18px 25px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.brand-logo{
    flex:1;
    text-align:center;
}

.brand-logo h1{
    margin:0;
    font-size:38px;
    font-weight:900;
    letter-spacing:4px;
    background:linear-gradient(45deg,#D4AF37,#FFD700,#E6C35C);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.brand-logo span{
    display:block;
    margin-top:4px;
    font-size:11px;
    letter-spacing:4px;
    color:#d6d6d6;
}

.header-icons{
    display:flex;
    align-items:center;
    gap:12px;
}

.icon-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    color:#fff;
    cursor:pointer;
    transition:.3s;
    position:relative;
    font-size:18px;
}

.icon-btn:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:#D4AF37;
    color:#000;
    font-size:12px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CONTENT */
.container{
    padding:20px;
    max-width:900px;
    margin:auto;
}

.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.product{
    background:#fff;
    border-radius:20px;
    padding:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
    text-align:center;
    transition:.3s;
}

.product:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 45px rgba(0,0,0,.12);
}

.product img{
    width:100%;
    border-radius:15px;
}

.product h3{
    margin:15px 0 8px;
    font-size:20px;
}

.product p{
    color:#D4AF37;
    font-size:22px;
    font-weight:800;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#000,#222);
    color:#fff;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    margin-top:10px;
    font-size:16px;
}

button:hover{
    background:linear-gradient(45deg,#D4AF37,#b8962f);
    color:#000;
}

.cart{
    background:#fafafa;
    padding:20px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.total{
    font-size:24px;
    font-weight:800;
    color:#D4AF37;
    margin-top:20px;
    text-align:center;
}

input,select{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:16px;
    box-sizing:border-box;
}

/* MOBILE */
@media(max-width:768px){

    .main-header{
        padding:15px;
    }

    .brand-logo h1{
        font-size:28px;
        letter-spacing:2px;
    }

    .brand-logo span{
        font-size:9px;
        letter-spacing:2px;
    }

    .icon-btn{
        width:42px;
        height:42px;
        font-size:16px;
    }

    .countdown{
        font-size:16px;
        padding:7px 14px;
    }

    .products{
        grid-template-columns:1fr;
    }
}
</style>
</head>

// ==========================
// CART DRAWER SYSTEM
// ==========================

let cart = [];

/* إضافة منتج */
function addToCart(name, price, image, availableSizes = []) {
    const existing = cart.find(item => item.name === name);

    if (existing) {
        existing.qty++;
    } else {
        cart.push({
            id: Date.now(),
            name,
            price,
            image,
            qty: 1,
            size: availableSizes[0] || "",
            sizes: availableSizes
        });
    }

    updateCartCount();
    renderCartDrawer();
    openCartDrawer();
}

/* فتح السلة */
function openCartDrawer() {
    document.getElementById("cartDrawer").classList.add("active");
    document.getElementById("cartOverlay").classList.add("active");
}

/* غلق السلة */
function closeCartDrawer() {
    document.getElementById("cartDrawer").classList.remove("active");
    document.getElementById("cartOverlay").classList.remove("active");
}

/* تحديث عدد المنتجات */
function updateCartCount() {
    const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
    document.getElementById("cartCount").textContent = totalItems;
}

/* تغيير الكمية */
function changeQty(index, action) {
    if (action === 'plus') {
        cart[index].qty++;
    } else {
        cart[index].qty--;
        if (cart[index].qty <= 0) {
            cart.splice(index, 1);
        }
    }

    updateCartCount();
    renderCartDrawer();
}

/* تغيير المقاس */
function changeSize(index, value) {
    cart[index].size = value;
}

/* حساب الإجمالي */
function getCartTotal() {
    return cart.reduce((sum, item) => {
        return sum + (item.price * item.qty);
    }, 0);
}

/* رسم السلة */
function renderCartDrawer() {

    const container = document.getElementById("cartItems");

    if (cart.length === 0) {
        container.innerHTML = `
            <div class="empty-cart">
                <i class="fas fa-shopping-bag"></i>
                <h3>السلة فارغة</h3>
                <p>أضف منتجاتك المفضلة الآن</p>
            </div>
        `;

        document.getElementById("cartTotal").innerText = "0";
        return;
    }

    let html = '';

    cart.forEach((item, index) => {
        html += `
            <div class="cart-product">

                <img src="${item.image}" class="cart-product-image">

                <div class="cart-product-info">

                    <h4>${item.name}</h4>

                    <div class="cart-price">
                        ${item.price} ج
                    </div>

                    <select class="cart-size-select"
                        onchange="changeSize(${index}, this.value)">
                        ${item.sizes.map(size => `
                            <option value="${size}"
                                ${size === item.size ? 'selected' : ''}>
                                ${size}
                            </option>
                        `).join('')}
                    </select>

                    <div class="qty-box">
                        <button onclick="changeQty(${index}, 'minus')">-</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty(${index}, 'plus')">+</button>
                    </div>

                </div>

                <div class="cart-item-total">
                    ${item.price * item.qty} ج
                </div>

            </div>
        `;
    });

    container.innerHTML = html;
    document.getElementById("cartTotal").innerText = getCartTotal();
}

/* فتح نموذج الطلب */
function openCheckoutModal() {
    if (cart.length === 0) {
        alert("السلة فارغة");
        return;
    }

    document.getElementById("checkoutModal").classList.add("active");
}

/* غلق نموذج الطلب */
function closeCheckoutModal() {
    document.getElementById("checkoutModal").classList.remove("active");
}

/* إرسال الطلب */
async function submitOrder() {

    const name = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("customerPhone").value.trim();
    const address = document.getElementById("customerAddress").value.trim();

    if (!name || !phone || !address) {
        alert("يرجى إدخال جميع البيانات");
        return;
    }

    const order = {
        customerName: name,
        customerPhone: phone,
        customerAddress: address,
        items: cart,
        total: getCartTotal(),
        createdAt: new Date().toISOString(),
        status: "pending"
    };

    // Firebase
    await addDoc(collection(db, "orders"), order);

    // WhatsApp Message
    let message = `✨ طلب جديد - VANTÉ\n\n`;
    message += `الاسم: ${name}\n`;
    message += `الهاتف: ${phone}\n`;
    message += `العنوان: ${address}\n\n`;

    cart.forEach(item => {
        message += `• ${item.name}\n`;
        message += `المقاس: ${item.size}\n`;
        message += `الكمية: ${item.qty}\n`;
        message += `الإجمالي: ${item.price * item.qty} ج\n\n`;
    });

    message += `💰 الإجمالي النهائي: ${getCartTotal()} ج`;

    window.open(
        `https://wa.me/201106018685?text=${encodeURIComponent(message)}`,
        "_blank"
    );

    alert("تم إرسال طلبك بنجاح");

    cart = [];
    renderCartDrawer();
    updateCartCount();
    closeCheckoutModal();
    closeCartDrawer();
}

    } catch (error) {
        console.error(error);
        alert("حدث خطأ أثناء إرسال الطلب");
    }
};

/* عداد العرض */
function startCountdown() {

    const target = new Date().getTime() + (24 * 60 * 60 * 1000);

    setInterval(() => {

        const now = new Date().getTime();
        const distance = target - now;

        if (distance <= 0) {
            document.getElementById("countdown").innerHTML = "انتهى العرض";
            return;
        }

        const hours = Math.floor(
            (distance % (1000 * 60 * 60 * 24)) /
            (1000 * 60 * 60)
        );

        const minutes = Math.floor(
            (distance % (1000 * 60 * 60)) /
            (1000 * 60)
        );

        const seconds = Math.floor(
            (distance % (1000 * 60)) / 1000
        );

        document.getElementById("hours").textContent =
            String(hours).padStart(2, "0");

        document.getElementById("minutes").textContent =
            String(minutes).padStart(2, "0");

        document.getElementById("seconds").textContent =
            String(seconds).padStart(2, "0");

    }, 1000);
}

startCountdown();
renderCart();

</script>
