<head>

/* ====================================
   RESET
==================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Cairo',sans-serif;
    background:#ffffff;
    color:#111111;
    line-height:1.6;
    overflow-x:hidden;
}

img{
    max-width:100%;
    display:block;
}

a{
    text-decoration:none;
}

button,
input,
select{
    font-family:inherit;
    outline:none;
}

/* ====================================
   TOP OFFER BAR
==================================== */
.top-offer{
    background:#000;
    color:#D4AF37;
    padding:14px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    flex-wrap:wrap;
    text-align:center;
    font-size:14px;
    font-weight:700;
    border-bottom:1px solid rgba(212,175,55,.2);
}

.offer-text{
    letter-spacing:.5px;
}

.offer-timer{
    display:flex;
    align-items:center;
    gap:8px;
    direction:ltr;
    color:#fff;
    font-weight:700;
}

.offer-timer span{
    background:#D4AF37;
    color:#000;
    min-width:38px;
    padding:7px 10px;
    border-radius:10px;
    font-weight:900;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 15px rgba(212,175,55,.35);
}

/* ====================================
   NAVBAR
==================================== */
.nav-bar{
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:72px;
    padding:0 35px;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
    direction:ltr;
}

/* LOGO */
.logo{
    grid-column:1;
    justify-self:start;
    font-size:30px;
    font-weight:900;
    letter-spacing:3px;
    cursor:pointer;
    background:linear-gradient(135deg,#D4AF37,#FFD700,#B8860B);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    line-height:1;
}

/* MENU */
.menu{
    grid-column:2;
    justify-self:center;
    display:flex;
    align-items:center;
    gap:28px;
    transform: translateX(-80px);
}

.menu a{
    color:#111;
    font-size:14.5px;
    font-weight:700;
    transition:.3s;
    position:relative;
    line-height:1;
    padding:6px 2px;
}

.menu a::after{
    content:'';
    position:absolute;
    bottom:-6px;
    right:0;
    width:0;
    height:2px;
    background:#D4AF37;
    transition:.3s;
}

.menu a:hover{
    color:#D4AF37;
}

.menu a:hover::after{
    width:100%;
}

/* ICONS */
.icons{
    grid-column:3;
    justify-self:end;
    display:flex;
    align-items:center;
    gap:10px;
}

.icons button{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:#111;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.3s;
    position:relative;
}

.icons button:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
}

.icons i{
    font-size:16px;
}

/* CART COUNT */
.cart-count{
    position:absolute;
    top:-6px;
    right:-6px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#D4AF37;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    border:2px solid #fff;
}

/* ====================================
   HERO
==================================== */
.hero{
    width:100%;
    overflow:hidden;
    line-height:0;
    background:#fff;
}

.hero img{
    width:100%;
    height:auto;
    object-fit:cover;
}

/* ====================================
   PRODUCTS
==================================== */
.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.container h2{
    text-align:center;
    margin-bottom:40px;
    font-size:34px;
    color:#111;
}

.product{
    background:#fff;
    border:1px solid #eee;
    border-radius:24px;
    padding:18px;
    text-align:center;
    transition:.35s;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
    overflow:hidden;
}

.product:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 50px rgba(0,0,0,.12);
}

/* الصورة فقط هي التي تفتح نافذة المنتج */
.product-image{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    cursor:pointer;
    margin-bottom:18px;
}

.product-image img{
    width:100%;
    transition:.5s;
}

.product:hover .product-image img{
    transform:scale(1.06);
}

/* معرض الصور */
.product-gallery{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px 0 20px;
}

.product-gallery img{
    width:65px;
    height:65px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    border:2px solid #eee;
    transition:.3s;
}

.product-gallery img:hover{
    border-color:#D4AF37;
    transform:translateY(-3px);
}

/* زر السلة */
.add-cart-btn{

    font-size:16px;
    font-weight:800;
    letter-spacing:.3px;
}
      
/* BUTTONS */
button{

    padding:14px;
    border:none;
    border-radius:12px;
    background:#000;
    color:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{

    color:#000;

/* =========================================
   REVIEW SECTION
========================================= */

#reviewText{

    min-height:120px;
    margin-top:18px;
    padding:18px;
    border:1px solid #e5e5e5;
    border-radius:18px;
    resize:none;
    font-size:15px;
    line-height:1.8;
    background:#fafafa;
}

#reviewText:focus{
    border-color:#D4AF37;
    background:#fff;
}

.review-label{
    text-align:right;
    margin:18px 0 8px;
    font-size:15px;
    font-weight:700;
    color:#222;
}

.review-submit{
    margin-top:18px;
    background:#111;
    font-size:14px;
    font-weight:700;
}

.review-submit:hover{
    background:#D4AF37;
    color:#000;
}      

/* ====================================
   CART DRAWER
==================================== */
.drawer{
    position:fixed;
    top:0;
    right:-100%;
    width:380px;
    max-width:100%;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 40px rgba(0,0,0,.2);
    padding:25px;
    transition:.35s ease;
    z-index:2000;
    overflow-y:auto;
}

.drawer.active{
    right:0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.total{
    text-align:center;
    font-size:24px;
    margin:25px 0;
    color:#D4AF37;
    font-weight:900;
}

/* ====================================
   MODAL
==================================== */
.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(.8);
    width:90%;
    max-width:450px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,.3);
    z-index:3000;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.modal.active{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
    visibility:visible;
}

.modal h2{
    text-align:center;
    margin-bottom:25px;
}

.modal input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:1500;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

#overlay.active{
    opacity:1;
    visibility:visible;
}

==================================== */
.mobile-actions,

  #menuOverlay{

}

.rating-stars{

.rating-stars span.active{

/* ==================================== SEARCH OVERLAY ==================================== */ .search-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:.35s; z-index:9999; padding:20px; } .search-overlay.active{ opacity:1; visibility:visible; } .search-box{ width:100%; max-width:550px; background:#fff; padding:20px; border-radius:22px; display:flex; align-items:center; gap:12px; box-shadow:0 25px 60px rgba(0,0,0,.25); animation:searchPopup .35s ease; } .search-box input{ flex:1; border:1px solid #ddd; padding:16px 20px; border-radius:14px; font-size:16px; background:#fafafa; } .search-box input:focus{ border-color:#D4AF37; background:#fff; } .search-box button{ width:auto; padding:16px 26px; border:none; border-radius:14px; background:#111; color:#fff; cursor:pointer; transition:.3s; } .search-box button:hover{ background:#D4AF37; color:#000; } @keyframes searchPopup{ from{ opacity:0; transform:scale(.9); } to{ opacity:1; transform:scale(1); } }     
    
</style>

/* ========================================= SEARCH ========================================= */ window.openSearch = function () { const overlay = document.getElementById("searchOverlay"); const input = document.getElementById("searchInput"); overlay.classList.add("active"); setTimeout(() => { input.focus(); }, 200); }; window.closeSearch = function () { document.getElementById("searchOverlay") .classList.remove("active"); }; /* إغلاق عند الضغط خارج الصندوق */ document.getElementById("searchOverlay") .addEventListener("click", function (e) { if (e.target === this) { closeSearch(); } }); /* زر ESC */ document.addEventListener("keydown", function (e) { if (e.key === "Escape") { closeSearch(); } }); /* ========================================= SEARCH PRODUCTS BY NAME ========================================= */ window.searchProducts = function () { const input = document.getElementById("searchInput"); const filter = input.value.toLowerCase().trim(); const products = document.querySelectorAll(".product"); let found = false; products.forEach(product => { const productName = product .querySelector("h3") .textContent .toLowerCase(); if (productName.includes(filter)) { product.style.display = "block"; found = true; } else { product.style.display = "none"; } }); closeSearch(); if (filter !== "") { document.querySelector(".container") .scrollIntoView({ behavior: "smooth" }); } if (!found && filter !== "") { alert("لم يتم العثور على المنتج"); } }; /* البحث عند الضغط على Enter */ document.getElementById("searchInput") .addEventListener("keydown", function (e) { if (e.key === "Enter") { searchProducts(); } });

        total += itemTotal;

                    <span>${item.qty}</span>
                    <button onclick="changeQty(${index}, 1)">+</button>
                </div>

                <div>
                    ${itemTotal} ج
                </div>
            </div>
        `;
    });

    document.getElementById("cartItems").innerHTML =
        cart.length ? html : "السلة فارغة";

    document.getElementById("total").innerText = total;
    document.getElementById("cartCount").innerText = itemsCount;
}

/* =========================================

========================================= */

let selectedProduct = null;
let selectedRating = 5;

/* =========================================
   OPEN PRODUCT
========================================= */
window.openProduct = function(id, title, price, img) {
    selectedProduct = id;
    selectedRating = 5;

    document.getElementById("modalTitle").textContent = title;
    document.getElementById("modalPrice").textContent = price + " جنيه";
    document.getElementById("modalImg").src = img;

    document.getElementById("reviewText").value = "";
    document.getElementById("reviewText").style.display = "none";

    highlightStars(selectedRating);

    document.getElementById("productModal").classList.add("active");
    document.getElementById("overlay").classList.add("active");
};

/* =========================================
   CLOSE PRODUCT
========================================= */
window.closeProduct = function() {
    document.getElementById("productModal").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");

    document.getElementById("reviewText").value = "";
    document.getElementById("reviewText").style.display = "none";

    selectedRating = 5;
    highlightStars(selectedRating);
};

/* =========================================
   STAR RATING SYSTEM
========================================= */
function initializeStars() {
    const stars = document.querySelectorAll("#stars span");

    if (!stars.length) return;

    function highlightStars(rating) {
        stars.forEach(star => {
            const value = Number(star.dataset.rate);
            star.classList.toggle("active", value <= rating);
        });
    }

    window.highlightStars = highlightStars;

    stars.forEach(star => {

        star.addEventListener("mouseenter", () => {
            highlightStars(Number(star.dataset.rate));
        });

        star.addEventListener("click", () => {
            selectedRating = Number(star.dataset.rate);
            highlightStars(selectedRating);

            const reviewText = document.getElementById("reviewText");
            reviewText.style.display = "block";
            reviewText.focus();
        });
    });

    document.getElementById("stars").addEventListener("mouseleave", () => {
        highlightStars(selectedRating);
    });

    highlightStars(selectedRating);
}

document.addEventListener("DOMContentLoaded", initializeStars);

/* =========================================
   SUBMIT REVIEW
========================================= */
window.submitReview = async function() {

    const text = document.getElementById("reviewText").value.trim();

    if (!currentUser) {
        alert("يجب تسجيل الدخول أولاً");
        return;
    }

    if (!text) {
        alert("اكتب رأيك أولاً");
        return;
    }

    try {
        await addDoc(collection(db, "reviews"), {
            productId: selectedProduct,
            name: currentUser.displayName || currentUser.email,
            rating: selectedRating,
            text: text,
            createdAt: new Date()
        });

        alert("تم إرسال تقييمك بنجاح");
        closeProduct();

    } catch (error) {
        console.error("Review Error:", error);
        alert("حدث خطأ أثناء إرسال التقييم");
    }
};

/* =========================================
   LOAD REVIEWS
========================================= */
onSnapshot(collection(db, "reviews"), (snapshot) => {

    let html = "";

    snapshot.forEach((doc) => {
        const r = doc.data();

        const stars = "★".repeat(r.rating) + "☆".repeat(5 - r.rating);

        html += `
            <div class="review-card">
                <div class="review-header">
                    <strong>${r.name}</strong>
                    <span class="review-stars">${stars}</span>
                </div>
                <p>${r.text}</p>
            </div>
        `;
    });

    document.getElementById("reviewsSection").innerHTML = html;
});
  
/* =========================================
   CHANGE QUANTITY
========================================= */
window.changeQty = function(index, change) {

    cart[index].qty += change;

    if (cart[index].qty <= 0) {
        cart.splice(index, 1);
    }

    updateCart();
};

/* =========================================
   CHECKOUT
========================================= */
window.checkout = async function() {

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();

    if (!name || !phone || !address) {
        alert("يرجى ملء جميع البيانات");
        return;
    }

    const total = cart.reduce(
        (sum, item) => sum + (item.price * item.qty),
        0
    );

    const order = {
        customerName: name,
        phone,
        address,
        items: cart,
        total,
        createdAt: new Date()
    };

    try {
        await addDoc(collection(db, "orders"), order);

        let message = `طلب جديد من متجر VANTÉ\n\n`;
        message += `الاسم: ${name}\n`;
        message += `الهاتف: ${phone}\n`;
        message += `العنوان: ${address}\n\n`;
        message += `المنتجات:\n`;

        cart.forEach(item => {
            message += `- ${item.name}\n`;
            message += `  المقاس: ${item.size}\n`;
            message += `  الكمية: ${item.qty}\n`;
            message += `  السعر: ${item.price * item.qty} جنيه\n\n`;
        });

        message += `الإجمالي: ${total} جنيه`;

        window.open(
            `https://wa.me/201106018685?text=${encodeURIComponent(message)}`,
            "_blank"
        );

        alert("تم إرسال طلبك بنجاح");

        cart = [];
        updateCart();

        closeCheckout();
        closeCart();

        document.getElementById("name").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("address").value = "";

    } catch (error) {
        console.error(error);
        alert("حدث خطأ أثناء إرسال الطلب");
    }
};
  
/* =========================================
   OFFER COUNTDOWN
========================================= */
const targetTime = new Date().getTime() + (4 * 60 * 60 * 1000);

setInterval(() => {

    const now = new Date().getTime();
    const diff = targetTime - now;

    if (diff <= 0) return;

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor(
        (diff % (1000 * 60 * 60)) / (1000 * 60)
    );
    const seconds = Math.floor(
        (diff % (1000 * 60)) / 1000
    );

    document.getElementById("h").textContent =
        String(hours).padStart(2, "0");

    document.getElementById("m").textContent =
        String(minutes).padStart(2, "0");

    document.getElementById("s").textContent =
        String(seconds).padStart(2, "0");

}, 1000);
