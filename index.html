<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTÉ | Minimal Luxury</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main CSS -->
    <style>
/* ====================================
   RESET
==================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Cairo',sans-serif;
    background:#ffffff;
    color:#111111;
    line-height:1.6;
    overflow-x:hidden;
}

img{
    max-width:100%;
    display:block;
}

a{
    text-decoration:none;
}

button,
input,
select{
    font-family:inherit;
    outline:none;
}

/* ====================================
   TOP OFFER BAR
==================================== */
.top-offer{
    background:#000;
    color:#D4AF37;
    padding:14px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    flex-wrap:wrap;
    text-align:center;
    font-size:14px;
    font-weight:700;
    border-bottom:1px solid rgba(212,175,55,.2);
}

.offer-text{
    letter-spacing:.5px;
}

.offer-timer{
    display:flex;
    align-items:center;
    gap:8px;
    direction:ltr;
    color:#fff;
    font-weight:700;
}

.offer-timer span{
    background:#D4AF37;
    color:#000;
    min-width:38px;
    padding:7px 10px;
    border-radius:10px;
    font-weight:900;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 15px rgba(212,175,55,.35);
}

/* ====================================
   NAVBAR
==================================== */
.nav-bar{
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:72px;
    padding:0 35px;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
    direction:ltr;
}

/* LOGO */
.logo{
    grid-column:1;
    justify-self:start;
    font-size:30px;
    font-weight:900;
    letter-spacing:3px;
    cursor:pointer;
    background:linear-gradient(135deg,#D4AF37,#FFD700,#B8860B);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    line-height:1;
}

/* MENU */
.menu{
    grid-column:2;
    justify-self:center;
    display:flex;
    align-items:center;
    gap:28px;
    transform: translateX(-80px);
}

.menu a{
    color:#111;
    font-size:14.5px;
    font-weight:700;
    transition:.3s;
    position:relative;
    line-height:1;
    padding:6px 2px;
}

.menu a::after{
    content:'';
    position:absolute;
    bottom:-6px;
    right:0;
    width:0;
    height:2px;
    background:#D4AF37;
    transition:.3s;
}

.menu a:hover{
    color:#D4AF37;
}

.menu a:hover::after{
    width:100%;
}

/* ICONS */
.icons{
    grid-column:3;
    justify-self:end;
    display:flex;
    align-items:center;
    gap:10px;
}

.icons button{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:#111;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.3s;
    position:relative;
}

.icons button:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
}

.icons i{
    font-size:16px;
}

/* CART COUNT */
.cart-count{
    position:absolute;
    top:-6px;
    right:-6px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#D4AF37;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    border:2px solid #fff;
}

/* ====================================
   HERO
==================================== */
.hero{
    width:100%;
    overflow:hidden;
    line-height:0;
    background:#fff;
}

.hero img{
    width:100%;
    height:auto;
    object-fit:cover;
}

/* ====================================
   PRODUCTS
==================================== */
.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.container h2{
    text-align:center;
    margin-bottom:40px;
    font-size:34px;
    color:#111;
}

.modal-close{
    position: absolute;
    top: 18px;
    left: 18px;
    width: 48px;
    height: 48px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.96);
    color: #111;
    font-size: 26px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    transition: all 0.3s ease;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.modal-close:hover{
    background: #111;
    color: #fff;
    transform: rotate(90deg) scale(1.08);
    box-shadow: 0 18px 40px rgba(0,0,0,0.28);
}

.modal-close:active{
    transform: rotate(90deg) scale(0.95);
}

.product{
    background:#fff;
    border:1px solid #eee;
    border-radius:24px;
    padding:18px;
    text-align:center;
    transition:.35s;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
    overflow:hidden;
}

.product:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 50px rgba(0,0,0,.12);
}

/* الصورة فقط هي التي تفتح نافذة المنتج */
.product-image{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    cursor:pointer;
    margin-bottom:18px;
}

.product-image img{
    width:100%;
    transition:.5s;
}

.product:hover .product-image img{
    transform:scale(1.06);
}

/* معرض الصور */
.product-gallery{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px 0 20px;
}

.product-gallery img{
    width:65px;
    height:65px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    border:2px solid #eee;
    transition:.3s;
}

.product-gallery img:hover{
    border-color:#D4AF37;
    transform:translateY(-3px);
}

/* زر السلة */
.add-cart-btn{
    margin-top:15px;
    font-size:16px;
    font-weight:800;
    letter-spacing:.3px;
}
      
/* ====================================
   GLOBAL BUTTON (ONLY PRIMARY BUTTONS)
==================================== */
.btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#000;
    color:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.btn-primary:hover{
    background:#D4AF37;
    color:#000;
}

.btn-secondary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#f2f2f2;
    color:#111;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.25s ease;
    margin-top:10px;
}

.btn-secondary:hover{
    background:#ddd;
}

.cart-item button{
    width:32px;
    height:32px;
    border-radius:8px;
    border:none;
    background:#111;
    color:#fff;
    cursor:pointer;
}

.cart-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px;
    border-bottom:1px solid #eee;
    font-size:14px;
}

/* =========================================
   REVIEW SECTION
========================================= */

#reviewText{
    width:100%;
    min-height:120px;
    margin-top:18px;
    padding:18px;
    border:1px solid #e5e5e5;
    border-radius:18px;
    resize:none;
    font-size:15px;
    line-height:1.8;
    background:#fafafa;
}

#reviewText:focus{
    border-color:#D4AF37;
    background:#fff;
}

.review-label{
    text-align:right;
    margin:18px 0 8px;
    font-size:15px;
    font-weight:700;
    color:#222;
}

/* زر التقييم */
.review-submit{
    width:auto;
    min-width:180px;
    padding:13px 28px;
    margin:20px auto 0;
    display:block;
    border-radius:14px;
    font-size:14px;
    font-weight:800;
}

/* زر أضف للسلة داخل النافذة */
.modal-cart-btn{
    width:auto;
    min-width:220px;
    padding:14px 32px;
    margin:18px auto;
    display:block;
    border-radius:14px;
    font-size:15px;
    font-weight:800;
}

/* ====================================
   CART DRAWER
==================================== */
.drawer{
    position:fixed;
    top:0;
    right:-100%;
    width:380px;
    max-width:100%;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 40px rgba(0,0,0,.2);
    padding:25px;
    transition:.35s ease;
    z-index:2000;
    overflow-y:auto;
}

.drawer.active{
    right:0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.total{
    text-align:center;
    font-size:24px;
    margin:25px 0;
    color:#D4AF37;
    font-weight:900;
}

/* ====================================
   MODAL
==================================== */
.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(.8);
    width:90%;
    max-width:450px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,.3);
    z-index:3000;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.modal.active{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
    visibility:visible;
}

.modal h2{
    text-align:center;
    margin-bottom:25px;
}

.modal input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

/* اختيار المقاس */
.modal-size{
    margin:22px 0;
    text-align:right;
}

.modal-size label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:800;
    color:#111;
}

body.modal-open{
    overflow:hidden;
}

/* النجوم */
.stars{
    margin-top:28px;
    margin-bottom:15px;
    text-align:center;
    font-size:34px;
}

.stars i{
    cursor:pointer;
    color:#ddd;
    transition:.25s;
}

.stars i.active,
.stars i:hover{
    color:#FFD700;
    transform:scale(1.12);
}

/* زر إرسال التقييم */
.review-submit:disabled{
    opacity:.45;
    cursor:not-allowed;
    transform:none;
}      

.modal-size select{
    width:100%;
    padding:14px 18px;
    border:1px solid #ddd;
    border-radius:14px;
    font-size:15px;
    background:#fff;
    cursor:pointer;
    outline:none;
    transition:.3s;
}

.modal-size select:focus{
    border-color:#D4AF37;
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:1500;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

#overlay.active{
    opacity:1;
    visibility:visible;
}

/* ====================================
   MOBILE HEADER ONLY
==================================== */
.mobile-actions,
.mobile-menu {
    display: none;
}

/* ====================================
   MOBILE DESIGN
==================================== */
@media (max-width: 768px) {

    .nav-bar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:15px 18px;
        direction:ltr; /* مهم جداً */
    }

    /* ترتيب العناصر */
    .mobile-actions{
        display:block;
        order:1;
    }

    .logo{
        order:2;
        font-size:28px;
        margin:0 auto;
    }

    .icons{
        order:3;
        display:flex;
        align-items:center;
        gap:0;
    }

    /* إخفاء المنيو الديسكتوب */
    .menu{
        display:none !important;
    }

    /* إظهار السلة فقط */
    .icons button:not(:last-child){
        display:none;
    }

    /* زر القائمة */
    .mobile-btn{
        width:46px;
        height:46px;
        border:none;
        border-radius:50%;
        background:#111;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        font-size:18px;
    }

    /* القائمة الجانبية */
    .mobile-menu{
        display:flex;
        flex-direction:column;
        position:fixed;
        top:0;
        left:-100%;
        right:auto;
        width:320px;
        max-width:85%;
        height:100vh;
        background:#fff;
        padding:25px;
        z-index:5000;
        box-shadow:-10px 0 40px rgba(0,0,0,.25);
        transition:.4s ease;
    }

    .mobile-menu.active{
        left:0;
    }

    /* هيدر القائمة */
    .mobile-menu-header{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom:30px;
        padding-bottom:20px;
        border-bottom:1px solid #eee;
    }

    .mobile-header-icons{
        display:flex;
        gap:12px;
    }
  
.mobile-icons-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
    margin-top:15px;
    padding:10px 5px;
}
  
    /* الأيقونات العادية */
.mobile-icon{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:#111;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

  .mobile-icon:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
}
  
    .close-menu{
      position:absolute;
        top:0;
        right:0;
        width:46px;
        height:46px;
        border:none;
        border-radius:50%;
        background:#f5f5f5;
        color:#111;
        box-shadow:none;
        transition:.3s;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        font-size:18px;
    }

    /* روابط القائمة */
    .mobile-menu a{
        padding:18px 0;
        border-bottom:1px solid #f2f2f2;
        color:#111;
        font-size:18px;
        font-weight:700;
        transition:.3s;
    }

    .mobile-menu a:hover{
        color:#D4AF37;
        padding-right:12px;
    }
  #menuOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:4000;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

/* لما القائمة تفتح */
#menuOverlay.active{
    opacity:1;
    visibility:visible;
}
  
}

.rating-stars{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin:22px 0;
    direction:ltr;
    user-select:none;
}

.rating-stars span{
    font-size:42px;
    color:#ddd;
    cursor:pointer;
    transition:all .25s ease;
    line-height:1;
}

.rating-stars span:hover{
    transform:scale(1.2);
}

.rating-stars span.active{
    color:#FFD700;
    text-shadow:
        0 0 8px rgba(255,215,0,.8),
        0 0 18px rgba(255,215,0,.5);
}

/* =========================================
   FIXED PRODUCT MODAL (SCROLL + LAYOUT)
========================================= */

#productModal.modal{
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(.9);
    width: min(92%, 480px);
    max-height: 85vh;
    background: #fff;
    border-radius: 24px;
    z-index: 99999;
    opacity: 0;
    visibility: hidden;
    transition: .25s ease;
    box-shadow: 0 30px 80px rgba(0,0,0,.3);
    overflow: hidden; /* مهم */
}

/* فتح المودال */
#productModal.active{
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
}

/* المحتوى الداخلي بس هو اللي بيسكرول */
#productModal .modal-content{
    max-height: 85vh;
    overflow-y: auto;
    padding: 20px;
}

/* زر الإغلاق ثابت برا المحتوى */
.modal-close{
    position: absolute;
    top: 12px;
    right: 12px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: #111;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    z-index: 100000;
}

/* ==============================
   PRODUCT SELECT FIX
============================== */

.product select{
    width:100%;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    border:1px solid #eee;
    font-weight:600;
    background:#fff;
}

/* =========================================
   SIZE LABEL
========================================= */

.modal-size label{
    display:flex;
    gap:8px;
    align-items:center;
    font-weight:800;
    margin-bottom:10px;
}

/* =========================================
   QTY BOX FIX (+ -)
========================================= */

.qty-box{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#111;
    padding:6px;
    border-radius:16px;
    width:140px;
    margin:15px auto;
}

.qty-btn{
    width:38px;
    height:38px;
    border:none;
    border-radius:12px;
    background:#D4AF37;
    color:#000;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

.qty-number{
    color:#fff;
    font-weight:900;
    min-width:30px;
    text-align:center;
    font-size:16px;
}

/* ====================================
   QTY BUTTON FIX (ISOLATED)
==================================== */

.qty-box button{
    all: unset; /* 👈 أهم سطر: يمسح تأثير button العام */
    width:36px;
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:10px;
    background:linear-gradient(145deg,#1a1a1a,#0d0d0d);
    color:#D4AF37;

    font-size:20px;
    font-weight:900;
    cursor:pointer;

    transition:.25s ease;
}

.qty-box button:hover{
    background:#D4AF37;
    color:#111;
    transform:scale(1.08);
}

.qty-box button:active{
    transform:scale(.95);
}
      
/* ==================================== SEARCH OVERLAY ==================================== */ .search-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:.35s; z-index:9999; padding:20px; } .search-overlay.active{ opacity:1; visibility:visible; } .search-box{ width:100%; max-width:550px; background:#fff; padding:20px; border-radius:22px; display:flex; align-items:center; gap:12px; box-shadow:0 25px 60px rgba(0,0,0,.25); animation:searchPopup .35s ease; } .search-box input{ flex:1; border:1px solid #ddd; padding:16px 20px; border-radius:14px; font-size:16px; background:#fafafa; } .search-box input:focus{ border-color:#D4AF37; background:#fff; } .search-box button{ width:auto; padding:16px 26px; border:none; border-radius:14px; background:#111; color:#fff; cursor:pointer; transition:.3s; } .search-box button:hover{ background:#D4AF37; color:#000; } @keyframes searchPopup{ from{ opacity:0; transform:scale(.9); } to{ opacity:1; transform:scale(1); } }     
    
</style>
</head>

<body>

    <!-- TOP OFFER BAR -->
    <div class="top-offer">
        <div class="offer-text">
            خصم 10% لفترة محدودة
        </div>

        <div class="offer-timer">

        </div>

    <!-- NAVBAR -->
    <header class="nav-bar">

        <!-- LOGO -->
        <div class="logo">VANTÉ</div>

      <!-- MOBILE MENU BUTTON -->
<div class="mobile-actions">
    <button class="mobile-btn" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
    </button>
</div>

<div id="menuOverlay" onclick="toggleMobileMenu()"></div>
<!-- MOBILE SIDE MENU -->
<nav class="mobile-menu" id="mobileMenu">

   <div class="mobile-menu-header">

  <div class="mobile-icons-row">
    
     <button class="mobile-icon left" onclick="alert('حسابي قريباً')">
        <i class="fas fa-user"></i>
    </button>
<button class="mobile-icon" onclick="openSearch(); toggleMobileMenu();"> <i class="fas fa-search"></i> </button>
   
</div>

    <button class="close-menu" onclick="toggleMobileMenu()">
        <i class="fas fa-times"></i>
    </button>

</div>

    <a href="#" onclick="toggleMobileMenu()">Home</a>
    <a href="#" onclick="toggleMobileMenu()">Collections</a>
    <a href="#" onclick="toggleMobileMenu()">Clearance Sale</a>
    <a href="#" onclick="toggleMobileMenu()">Contact Us</a>

</nav>

        <!-- MENU -->
        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Collections</a>
            <a href="#">Clearance Sale</a>
            <a href="#">Contact Us</a>
        </nav>

        <!-- ICONS -->

window.openSearch = function () {

    document.getElementById("searchOverlay").classList.remove("active");
};

    if (e.target === this) closeSearch();
});

    if (e.key === "Escape") closeSearch();
});

window.searchProducts = function () {

    const filter = document.getElementById("searchInput")
        .value.toLowerCase().trim();

    const products = document.querySelectorAll(".product");

    let found = false;

    products.forEach(product => {
        const name = product.querySelector("h3").textContent.toLowerCase();

        if (name.includes(filter)) {
            product.style.display = "block";
            found = true;
        } else {
            product.style.display = "none";
        }
    });

    closeSearch();

    if (!found && filter) {
        alert("لم يتم العثور على المنتج");
    }
};

/* =========================================
   CART SYSTEM
========================================= */
let cart = [];

/* ADD TO CART (FIXED SINGLE VERSION) */
window.addToCart = function(name, price, size, image, event) {

    if (event) event.stopPropagation();

    const existing = cart.find(item =>
        item.name === name && item.size === size
    );

    if (existing) {
        existing.qty++;
    } else {
        cart.push({ name, price, size, image, qty: 1 });
    }

    updateCart();
    openCart();
};

/* UPDATE CART */
function updateCart() {

    let total = 0;
    let count = 0;

    const html = cart.map((item, index) => {

        total += item.price * item.qty;
        count += item.qty;

        return `
        <div class="cart-item">
            <div>
                <strong>${item.name}</strong><br>
                <small>${item.size}</small>
            </div>

            <div>
                <button onclick="changeQty(${index},-1)">-</button>
                ${item.qty}
                <button onclick="changeQty(${index},1)">+</button>
            </div>

            <div>${item.price * item.qty} ج</div>
        </div>
        `;
    }).join("");

    document.getElementById("cartItems").innerHTML =
        cart.length ? html : "السلة فارغة";

    document.getElementById("total").innerText = total;
    document.getElementById("cartCount").innerText = count;
}

window.changeQty = function(index, change) {
    cart[index].qty += change;

    if (cart[index].qty <= 0) {
        cart.splice(index, 1);
    }

    updateCart();
};

/* CART UI */
window.openCart = function () {
    document.getElementById("cartDrawer").classList.add("active");
    document.getElementById("overlay").classList.add("active");
};

window.closeCart = function () {
    document.getElementById("cartDrawer").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
};

/* =========================================
   CHECKOUT (FIXED ERROR)
========================================= */
window.checkout = async function () {
    const btn = document.querySelector("#checkoutModal .btn-primary");

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const gov = document.getElementById("governorate").value;
const city = document.getElementById("city").value;
const address = document.getElementById("address")?.value.trim() || "";

    const gov = govInput?.value || "";
    const city = cityInput?.value || "";
    const address = addressInput?.value.trim() || "";

    if (!name || !phone || !gov || !city || !address) {
        alert("يرجى استكمال جميع بيانات الشحن");
        return;
    }

    if (cart.length === 0) {
        alert("السلة فارغة");
        return;
    }

    btn.disabled = true;
    btn.innerText = "جاري إرسال الطلب...";

    try {
        const quantity = cart.reduce((sum, item) => sum + item.qty, 0);
        const subtotal = cart.reduce(
            (sum, item) => sum + (item.price * item.qty),
            0
        );

        const shipping = 70;
        const finalTotal = subtotal + shipping;
        const orderID = "V" + Date.now();

        const orderDetails = cart.map(item => ({
            name: item.name,
            size: item.size || "",
            qty: item.qty,
            price: item.price,
            image: item.image || ""
        }));

        const orderData = {
            orderID,
            customerName: name,
            phone,
            gov,
            city,
            address,
            orderDetails,
            quantity,
            subtotal,
            shipping,
            finalTotal,
            status: "new",
            createdAt: serverTimestamp()
        };

        await addDoc(collection(db, "orders"), orderData);

        let message = `🛍️ طلب جديد - VANTÉ\n\n`;
        message += `📦 رقم الطلب: ${orderID}\n`;
        message += `👤 الاسم: ${name}\n`;
        message += `📱 الهاتف: ${phone}\n`;
        message += `📍 المحافظة: ${gov}\n`;
        message += `🏙️ المدينة: ${city}\n`;
        message += `🏠 العنوان: ${address}\n\n`;

        cart.forEach(item => {
            message += `• ${item.name}\n`;
            message += `المقاس: ${item.size}\n`;
            message += `الكمية: ${item.qty}\n`;
            message += `السعر: ${item.price * item.qty} جنيه\n\n`;
        });

        message += `🚚 الشحن: ${shipping} جنيه\n`;
        message += `💰 الإجمالي: ${finalTotal} جنيه`;

 window.open(
            `https://wa.me/201106018685?text=${encodeURIComponent(message)}`,
            "_blank"
        );

        cart = [];
        updateCart();

        nameInput.value = "";
        phoneInput.value = "";
        govInput.selectedIndex = 0;
        cityInput.selectedIndex = 0;
        addressInput.value = "";

        closeCheckout();
        closeCart();

        alert("تم إرسال طلبك بنجاح ✨");

    } catch (error) {
        console.error("Checkout Error:", error);
        alert("حدث خطأ أثناء إرسال الطلب، حاول مرة أخرى.");
    } finally {
        btn.disabled = false;
        btn.innerText = "تأكيد الطلب";
    }
};

/* =========================================

========================================= */
const targetTime = Date.now() + 4 * 60 * 60 * 1000;

setInterval(() => {

    const diff = targetTime - Date.now();

    if (diff <= 0) return;

    document.getElementById("h").textContent =
        String(Math.floor(diff / 3600000)).padStart(2,"0");

    document.getElementById("m").textContent =
        String(Math.floor(diff % 3600000 / 60000)).padStart(2,"0");

    document.getElementById("s").textContent =
        String(Math.floor(diff % 60000 / 1000)).padStart(2,"0");

}, 1000);

    document.getElementById("modalImg").src = image;
    document.getElementById("modalImg").alt = name;

    const sizeSelect = document.getElementById("modalSize");
    sizeSelect.innerHTML = "";

    (sizes.length ? sizes : ["7", "8", "9"]).forEach(size => {
        sizeSelect.innerHTML += `<option value="${size}">${size}</option>`;
    });

    document.getElementById("reviewText").value = "";
    document.getElementById("reviewText").style.display = "none";

    selectedRating = 0;
    document.querySelectorAll(".rating-stars span").forEach(star => {
        star.classList.remove("active");
    });

    document.getElementById("productModal").classList.add("active");
    document.getElementById("overlay").classList.add("active");
    document.body.classList.add("modal-open");
};

window.closeProduct = function () {
    document.getElementById("productModal").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
    document.body.classList.remove("modal-open");
};

/* =========================================
   ADD CURRENT PRODUCT TO CART
========================================= */
window.addCurrentProductToCart = function(event) {
    if (!currentProduct) return;

    if (event) event.stopPropagation();

    const size = document.getElementById("modalSize").value;

    addToCart(
        currentProduct.name,
        currentProduct.price,
        size,
        currentProduct.image,
        event
    );

    // 👇 دي الإضافة المهمة: تقفل نافذة المنتج
    closeProduct();
};

/* =========================================
   STAR RATING SYSTEM
========================================= */
document.querySelectorAll(".rating-stars span").forEach((star, index) => {
    star.addEventListener("click", function() {
        selectedRating = index + 1;

        document.querySelectorAll(".rating-stars span").forEach((s, i) => {
            s.classList.toggle("active", i < selectedRating);
        });

        document.getElementById("reviewText").style.display = "block";
    });
});

/* =========================================
   SUBMIT REVIEW
========================================= */
window.submitReview = async function() {
    if (!currentProduct) {
        alert("اختر منتج أولاً");
        return;
    }

    if (selectedRating === 0) {
        alert("اختر عدد النجوم");
        return;
    }

    const reviewText = document.getElementById("reviewText").value.trim();

    try {
        await addDoc(collection(db, "reviews"), {
            productId: currentProduct.id,
            productName: currentProduct.name,
            rating: selectedRating,
            text: reviewText,
            createdAt: serverTimestamp()
        });

        alert("تم إرسال تقييمك بنجاح");

        document.getElementById("reviewText").value = "";
        document.getElementById("reviewText").style.display = "none";

        selectedRating = 0;
        document.querySelectorAll(".rating-stars span").forEach(star => {
            star.classList.remove("active");
        });

    } catch (error) {
        console.error(error);
        alert("حدث خطأ أثناء إرسال التقييم");
    }
};

</script>
  
</body>
