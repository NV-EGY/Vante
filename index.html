<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VANTÉ | Minimal Luxury</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#fff;
  color:#111;
}

.offer-bar{
    background:linear-gradient(90deg,#000,#1a1a1a,#000);
    color:#fff;
    padding:12px 15px;
    text-align:center;
    border-bottom:1px solid rgba(212,175,55,.25);
}

.offer-content{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.offer-text{
    font-size:15px;
    font-weight:700;
    color:#D4AF37;
}

.countdown{
    background:rgba(212,175,55,.12);
    border:1px solid rgba(212,175,55,.35);
    padding:8px 18px;
    border-radius:50px;
    font-size:18px;
    font-weight:800;
    letter-spacing:2px;
    color:#fff;
}

.main-header{
    background:#000;
    color:#fff;
    padding:18px 25px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.brand-logo{
    text-align:center;
    flex:1;
}

.brand-logo h1{
    margin:0;
    font-size:38px;
    font-weight:900;
    letter-spacing:4px;
    background:linear-gradient(45deg,#D4AF37,#FFD700,#E6C35C);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.brand-logo span{
    display:block;
    margin-top:4px;
    font-size:11px;
    letter-spacing:4px;
    color:#d6d6d6;
}

.header-icons{
    display:flex;
    align-items:center;
    gap:12px;
}

.icon-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    color:#fff;
    cursor:pointer;
    transition:.3s;
    position:relative;
    font-size:18px;
}

.icon-btn:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
}

.cart-btn{
    position:relative;
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:#D4AF37;
    color:#000;
    font-size:12px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
}

@media(max-width:768px){
    .main-header{
        padding:15px;
    }

    .brand-logo h1{
        font-size:28px;
        letter-spacing:2px;
    }

    .brand-logo span{
        font-size:9px;
        letter-spacing:2px;
    }

    .icon-btn{
        width:42px;
        height:42px;
        font-size:16px;
    }

    .countdown{
        font-size:16px;
        padding:7px 14px;
    }
  
.container{
  padding:20px;
  max-width:700px;
  margin:auto;
}

.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.product{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

.product img{
  width:100%;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0F7B65;
  color:#fff;
  font-weight:bold;
  margin-top:8px;
}

.cart{
  background:#f9f9f9;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.total{
  font-weight:bold;
  color:#0F7B65;
  margin-top:10px;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- TOP OFFER BAR -->
<div class="offer-bar">
    <div class="offer-content">
        <span class="offer-text">🔥 خصم خاص اليوم 10% على جميع المنتجات</span>
        <div class="countdown" id="countdown">
            <span id="hours">00</span>:
            <span id="minutes">00</span>:
            <span id="seconds">00</span>
        </div>
    </div>
</div>

<!-- MAIN HEADER -->
<header class="main-header">
    <div class="header-icons">
        <button class="icon-btn" aria-label="تسجيل الدخول">
            <i class="fas fa-user"></i>
        </button>

        <button class="icon-btn" aria-label="البحث">
            <i class="fas fa-search"></i>
        </button>

        <button class="icon-btn cart-btn" aria-label="سلة التسوق">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count" id="cartCount">0</span>
        </button>
    </div>

    <div class="brand-logo">
        <h1>VANTÉ</h1>
        <span>MINIMAL LUXURY</span>
    </div>
</header>

<!-- المنتجات -->
<section class="container">
  <h2>المنتجات</h2>

  <div class="products">

    <div class="product">
      <img src="images/p1.webp">
      <h3>سوار فاخر</h3>
      <p>249 جنيه</p>

      <select id="size1">
        <option>16cm</option>
        <option>18cm</option>
      </select>

      <button onclick="addToCart('سوار فاخر',249,document.getElementById('size1').value)">
        أضف للسلة
      </button>
    </div>

    <div class="product">
      <img src="images/p2.webp">
      <h3>خاتم أنيق</h3>
      <p>199 جنيه</p>

      <select id="size2">
        <option>7</option>
        <option>8</option>
      </select>

      <button onclick="addToCart('خاتم',199,document.getElementById('size2').value)">
        أضف للسلة
      </button>
    </div>

  </div>
</section>

<!-- السلة -->
<section class="container">
  <h2>🛒 سلة الطلب</h2>

  <div class="cart" id="cartItems"></div>

  <div class="total">
    الإجمالي: <span id="total">0</span> جنيه
  </div>
</section>

<!-- بيانات العميل -->
<section class="container">
  <h2>إتمام الطلب</h2>

  <input type="text" id="name" placeholder="اسمك">
  <input type="tel" id="phone" placeholder="رقمك">
  <input type="text" id="address" placeholder="العنوان">

  <button onclick="checkout()">تأكيد الطلب</button>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PUT-YOUR-KEY",
  authDomain: "YOUR",
  projectId: "YOUR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.cart = [];

window.addToCart = function(name,price,size){

  let item = cart.find(i=>i.name===name && i.size===size);

  if(item){
    item.qty++;
  }else{
    cart.push({name,price,size,qty:1});
  }

  renderCart();
}

function renderCart(){
  let box = document.getElementById("cartItems");
  box.innerHTML="";

  let total=0;

  cart.forEach((item,i)=>{
    total += item.price * item.qty;

    box.innerHTML += `
      <div class="cart-item">
        ${item.name} (${item.size}) × ${item.qty}
        <span>${item.price*item.qty}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

window.checkout = async function(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(cart.length === 0){
    alert("السلة فاضية");
    return;
  }

  await addDoc(collection(db,"orders"),{
    name,
    phone,
    address,
    cart,
    createdAt:new Date()
  });

  let message = `طلب جديد VANTÉ\n\n${cart.map(i=>
    `${i.name} (${i.size}) × ${i.qty}`
  ).join("\n")}`;

  window.location.href = "https://wa.me/201106018685?text="+encodeURIComponent(message);
}

function startCountdown() {
    const countdownDate = new Date().getTime() + (24 * 60 * 60 * 1000);

    const timer = setInterval(function () {
        const now = new Date().getTime();
        const distance = countdownDate - now;

        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("hours").textContent = String(hours).padStart(2, "0");
        document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
        document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");

        if (distance < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "انتهى العرض";
        }
    }, 1000);
}

startCountdown();
  
</script>

</body>
</html>
