<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل دخول الأدمن</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  width:300px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:10px;
  background:#0F7B65;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="box">
  <h2>🔐 تسجيل دخول</h2>

  <input type="email" id="email" placeholder="الإيميل">
  <input type="password" id="password" placeholder="الباسورد">

  <button onclick="login()">دخول</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCotT8EP2uy_HsgHknxeGBorKoEUORPtmU",
    authDomain: "vante-orders.firebaseapp.com",
    projectId: "vante-orders",
    storageBucket: "vante-orders.firebasestorage.app",
    messagingSenderId: "842319700646",
    appId: "1:842319700646:web:f6afd78ef7038c3be4ca67",
    measurementId: "G-56ZC1RW0T7"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function () {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try {

    // 🔐 تثبيت الجلسة
    await setPersistence(auth, browserLocalPersistence);

    // 🔑 تسجيل الدخول
    await signInWithEmailAndPassword(auth, email, password);

    window.location.href = "admin.html";

  } catch (err) {
    console.log(err);
    alert("❌ خطأ في الدخول");
  }
};
</script>
