<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        button { width: 100%; padding: 12px; background: #0F7B65; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .error { color: red; margin-top: 10px; font-size: 13px; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        const firebaseConfig = { /* نفس الإعدادات الموجودة */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.login = async () => {
            const email = document.getElementById("email").value;
            const pwd = document.getElementById("pwd").value;
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
                window.location.href = "admin-order.html";
            } catch (e) {
                document.getElementById("error").innerText = "بيانات الدخول غير صحيحة";
            }
        };
    </script>
</head>
<body>
    <div class="login-card">
        <h2>🔐 دخول المسؤول</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pwd" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <div id="error" class="error"></div>
    </div>
</body>
</html>
