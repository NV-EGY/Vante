<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

// ===== متغيرات تحميل المزيد =====
let nextPageToken = null;
let allDocuments = [];
let isLoadingMore = false;
let hasMorePages = true;
let refreshInterval = null;

    const firebaseConfig = {
        apiKey: "AIzaSyCotT8EP2uy_HsgHknxeGBorKoEUORPtmU",
        authDomain: "vante-orders.firebaseapp.com",
        projectId: "vante-orders",
        storageBucket: "vante-orders.firebasestorage.app",
        messagingSenderId: "842319700646",

    };

    const app = initializeApp(firebaseConfig);

    // ========== Custom Alert System ==========
window.customAlert = function(message, type = 'success', title = '') {
    return new Promise((resolve) => {
        // استخدام alert مؤقت بدلاً من المودال
        alert(message);
        resolve();
    });
};

// ========== Custom Confirm System ==========
window.customConfirm = function(message) {
    return new Promise((resolve) => {
        const result = confirm(message);
        resolve(result);
    });
};

    // ========== دوال مساعدة ==========
    function formatDate(timestamp) {
        if (!timestamp) return '-';
        const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return d.toLocaleString('ar-EG', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    function getBadgeClass(action) {
        const map = {
            'status_change': 'badge-status-change',
            'order_created': 'badge-order-created',
            'order_edited': 'badge-order-edited',
            'order_deleted': 'badge-order-deleted',
            'return_confirmed': 'badge-return-confirmed'
        };
        return map[action] || 'badge-status-change';
    }

    function getActionLabel(action) {
        const map = {
            'status_change': '🔄 تغيير حالة',
            'order_created': '✅ طلب جديد',
            'order_edited': '✏️ تعديل طلب',
            'order_deleted': '🗑️ حذف طلب',
            'return_confirmed': '📦 تأكيد مرتجع'
        };
        return map[action] || action;
    }

    function getActionIcon(action) {
        const map = {
            'status_change': 'fa-exchange-alt',
            'order_created': 'fa-plus-circle',
            'order_edited': 'fa-edit',
            'order_deleted': 'fa-trash',
            'return_confirmed': 'fa-check-double'
        };
        return map[action] || 'fa-circle';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

// ===== تحميل البيانات الأولي (500 سجل) =====
async function loadLogs(reset = true) {
    console.log("🔄 [Audit Log] جاري تحميل البيانات عبر REST API...");
    
    try {
        const projectId = "vante-orders";
        const token = await getAuthToken();
        
        if (reset) {
            allDocuments = [];
            nextPageToken = null;
            hasMorePages = true;
            document.getElementById('loadMoreContainer').style.display = 'none';
        }
        
        // ✅ pageSize = 500 للتحميل الأولي
        let url = `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/auditLog?orderBy=timestamp desc&pageSize=500`;
        if (nextPageToken) {
            url += `&pageToken=${nextPageToken}`;
        }
        
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        const documents = data.documents || [];
        nextPageToken = data.nextPageToken || null;
        hasMorePages = !!nextPageToken;
        
        if (reset) {
            allDocuments = documents;
        } else {
            allDocuments = allDocuments.concat(documents);
        }
        
        const newCount = allDocuments.length;
        console.log(`📊 [Audit Log] تم تحميل ${newCount} سجل${nextPageToken ? '، يوجد المزيد' : ''}`);
        
        allLogs = allDocuments.map(doc => {
            const fields = doc.fields || {};
            return {
                id: doc.name.split('/').pop(),
                action: fields.action?.stringValue || '',
                orderId: fields.orderId?.stringValue || '',
                orderNumber: fields.orderNumber?.stringValue || '',
                severity: fields.severity?.stringValue || 'info',
                details: fields.details?.mapValue?.fields || {},
                performedBy: fields.performedBy?.stringValue || 'system',
                timestamp: fields.timestamp?.timestampValue ? new Date(fields.timestamp.timestampValue) : null,
                createdAt: fields.createdAt?.timestampValue ? new Date(fields.createdAt.timestampValue) : null,
                oldStatus: fields.oldStatus?.stringValue || fields.details?.oldStatus?.stringValue || '',
                newStatus: fields.newStatus?.stringValue || fields.details?.newStatus?.stringValue || '',
                notes: fields.notes?.stringValue || fields.details?.notes?.stringValue || '',
                customerName: fields.customerName?.stringValue || fields.details?.customerName?.stringValue || '',
                finalTotal: fields.finalTotal?.integerValue || fields.finalTotal?.doubleValue || fields.details?.finalTotal?.integerValue || 0,
                changedFields: fields.changedFields?.arrayValue?.values?.map(v => v.stringValue) || []
            };
        });
        
        updateStats();
        applyFilters();
        
        // ✅ إظهار/إخفاء زر تحميل المزيد
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        const loadMoreCount = document.getElementById('loadMoreCount');
        const loadMoreText = document.getElementById('loadMoreText');
        
        if (hasMorePages && allLogs.length > 0) {
            loadMoreContainer.style.display = 'block';
            loadMoreCount.textContent = `(${allLogs.length} سجل)`;
            loadMoreText.textContent = 'تحميل المزيد';
            document.getElementById('loadMoreBtn').style.background = 'linear-gradient(135deg, #D4AF37, #B8860B)';
            document.getElementById('loadMoreBtn').style.color = '#000';
        } else if (!hasMorePages && allLogs.length > 0) {
            loadMoreContainer.style.display = 'block';
            loadMoreCount.textContent = `(✅ ${allLogs.length} سجل - الكل محمل)`;
            loadMoreText.textContent = '✅ تم تحميل الكل';
            document.getElementById('loadMoreBtn').style.background = '#27ae60';
            document.getElementById('loadMoreBtn').style.color = '#fff';
        } else {
            loadMoreContainer.style.display = 'none';
        }
        
    } catch (error) {
        console.error("❌ [Audit Log] خطأ في REST API:", error.message);
        document.getElementById("logTableBody").innerHTML = `
            <tr><td colspan="7">
                <div class="empty-state">
                    <i class="fas fa-exclamation-circle" style="color:#e74c3c;"></i>
                    <p>❌ خطأ في الاتصال: ${error.message}</p>
                    <button onclick="loadLogs(true)" style="margin-top:15px;padding:10px 25px;background:#D4AF37;border:none;border-radius:30px;font-weight:bold;cursor:pointer;">
                        <i class="fas fa-sync"></i> إعادة المحاولة
                    </button>
                </div>
            </td></tr>
        `;
    }
}

// ===== تحميل المزيد (500 سجل إضافية) =====
window.loadMoreLogs = async function() {
    if (isLoadingMore || !hasMorePages) return;
    
    isLoadingMore = true;
    const btn = document.getElementById('loadMoreBtn');
    const loading = document.getElementById('loadMoreLoading');
    const text = document.getElementById('loadMoreText');
    
    btn.style.opacity = '0.7';
    btn.style.cursor = 'wait';
    text.textContent = 'جاري التحميل...';
    loading.style.display = 'block';
    
    try {
        // ✅ تحميل 500 سجل إضافية (نفس حجم التحميل الأولي)
        const projectId = "vante-orders";
        const token = await getAuthToken();
        
        let url = `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/auditLog?orderBy=timestamp desc&pageSize=500`;
        if (nextPageToken) {
            url += `&pageToken=${nextPageToken}`;
        }
        
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        const documents = data.documents || [];
        nextPageToken = data.nextPageToken || null;
        hasMorePages = !!nextPageToken;
        
        allDocuments = allDocuments.concat(documents);
        
        // تحديث البيانات
        allLogs = allDocuments.map(doc => {
            const fields = doc.fields || {};
            return {
                id: doc.name.split('/').pop(),
                action: fields.action?.stringValue || '',
                orderId: fields.orderId?.stringValue || '',
                orderNumber: fields.orderNumber?.stringValue || '',
                severity: fields.severity?.stringValue || 'info',
                details: fields.details?.mapValue?.fields || {},
                performedBy: fields.performedBy?.stringValue || 'system',
                timestamp: fields.timestamp?.timestampValue ? new Date(fields.timestamp.timestampValue) : null,
                createdAt: fields.createdAt?.timestampValue ? new Date(fields.createdAt.timestampValue) : null,
                oldStatus: fields.oldStatus?.stringValue || fields.details?.oldStatus?.stringValue || '',
                newStatus: fields.newStatus?.stringValue || fields.details?.newStatus?.stringValue || '',
                notes: fields.notes?.stringValue || fields.details?.notes?.stringValue || '',
                customerName: fields.customerName?.stringValue || fields.details?.customerName?.stringValue || '',
                finalTotal: fields.finalTotal?.integerValue || fields.finalTotal?.doubleValue || fields.details?.finalTotal?.integerValue || 0,
                changedFields: fields.changedFields?.arrayValue?.values?.map(v => v.stringValue) || []
            };
        });
        
        updateStats();
        applyFilters();
        
        // ✅ تحديث العداد
        const loadMoreCount = document.getElementById('loadMoreCount');
        const loadMoreText = document.getElementById('loadMoreText');
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        
        if (hasMorePages) {
            loadMoreCount.textContent = `(${allLogs.length} سجل محمل)`;
            loadMoreText.textContent = 'تحميل المزيد +500';
        } else {
            loadMoreCount.textContent = `(✅ ${allLogs.length} سجل - الكل محمل)`;
            loadMoreText.textContent = '✅ تم تحميل الكل';
            btn.style.background = '#27ae60';
            btn.style.color = '#fff';
            setTimeout(() => {
                loadMoreContainer.style.display = 'none';
            }, 3000);
        }
        
    } catch (error) {
        console.error('❌ فشل تحميل المزيد:', error);
        document.getElementById('loadMoreText').textContent = '⚠️ فشل التحميل';
    } finally {
        isLoadingMore = false;
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
        loading.style.display = 'none';
    }
};

// ✅ دالة مساعدة للحصول على توكن المصادقة
async function getAuthToken() {
    return new Promise((resolve, reject) => {
        if (auth.currentUser) {
            auth.currentUser.getIdToken().then(resolve).catch(reject);
        } else {
            const unsubscribe = onAuthStateChanged(auth, (user) => {
                unsubscribe();
                if (user) {
                    user.getIdToken().then(resolve).catch(reject);
                } else {
                    reject(new Error('غير مسجل الدخول'));
                }
            });
        }
    });
}

// ✅ إضافة سجل عبر REST API
async function addLogViaREST(logData) {
    try {
        const token = await getAuthToken();
        const projectId = "vante-orders";
        const url = `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/auditLog`;
        
        // تحويل البيانات إلى صيغة Firestore
        const docData = {
            fields: {
                action: { stringValue: logData.action },
                orderId: { stringValue: logData.orderId || '' },
                orderNumber: { stringValue: logData.orderNumber || '' },
                severity: { stringValue: logData.severity || 'info' },
                details: { mapValue: { fields: Object.fromEntries(
                    Object.entries(logData.details || {}).map(([k, v]) => [k, { stringValue: String(v) }])
                ) } },
                performedBy: { stringValue: logData.performedBy || 'system' },
                timestamp: { timestampValue: new Date().toISOString() },
                createdAt: { timestampValue: new Date().toISOString() }
            }
        };
        
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(docData)
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        console.log("✅ [REST] تم إضافة المستند بنجاح");
        return await response.json();
        
    } catch (error) {
        console.error("❌ [REST] فشل إضافة المستند:", error);
        throw error;
    }
}

    // ========== الفلاتر ==========
    function applyFilters() {
    const severity = document.getElementById('filterSeverity').value;
    const dateFrom = document.getElementById('filterDateFrom').value;
    const dateTo = document.getElementById('filterDateTo').value;
    const action = document.getElementById('filterAction').value;
    const orderNumber = document.getElementById('filterOrderNumber').value.trim().toLowerCase();
    const user = document.getElementById('filterUser').value.trim().toLowerCase();

    console.log("🔍 [Audit Log] تطبيق الفلاتر، عدد السجلات الكلي:", allLogs.length);

    filteredLogs = allLogs.filter(log => {
  
            if (dateFrom) {
                const d = log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
                if (d < new Date(dateFrom)) return false;
            }
            if (dateTo) {
                const d = log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
                const end = new Date(dateTo);
                end.setHours(23, 59, 59);
                if (d > end) return false;
            }
            if (action !== 'all' && log.action !== action) return false;
            if (orderNumber) {
                const logOrder = (log.orderNumber || log.orderId || '').toLowerCase();
                if (!logOrder.includes(orderNumber)) return false;
            }
            if (user) {
                const logUser = (log.performedBy || '').toLowerCase();
                if (!logUser.includes(user)) return false;
            }
            if (severity !== 'all' && log.severity !== severity) return false;
                   return true;
    });

    console.log("📊 [Audit Log] بعد التصفية، عدد السجلات:", filteredLogs.length);
    renderLogs(filteredLogs);
}

window.restoreOrderFromLog = async function(logId) {
    try {
        console.log("🔄 [استرداد] بدء استرداد الطلب من السجل:", logId);
        
        const logSnap = await getDoc(doc(db, "auditLog", logId));
        if (!logSnap.exists()) {
            customAlert('❌ سجل التدقيق غير موجود', 'error');
            return;
        }
        
        const logData = logSnap.data();
        console.log("📄 [استرداد] بيانات السجل الخام:", logData);
        
        if (logData.action !== 'order_deleted') {
            customAlert('⚠️ هذا السجل ليس لعملية حذف طلب (العملية: ' + logData.action + ')', 'warning');
            return;
        }
        
        const orderId = logData.orderId;
        if (!orderId) {
            customAlert('❌ لا يوجد معرف طلب في هذا السجل', 'error');
            return;
        }
        
        // استخراج بيانات الطلب
        let orderData = {};
        if (logData.details?.orderDataSnapshot) {
            orderData = logData.details.orderDataSnapshot;
            console.log("✅ [استرداد] تم استخراج البيانات من orderDataSnapshot");
        } else if (logData.details) {
            orderData = logData.details;
            console.log("✅ [استرداد] تم استخراج البيانات من details");
        } else {
            orderData = {
                customerName: logData.customerName || 'مسترد',
                phone: logData.phone || '',
                gov: logData.gov || '',
                city: logData.city || '',
                address: logData.address || '',
                finalTotal: logData.finalTotal || 0,
                orderDetails: logData.orderDetails || [],
                notes: logData.notes || ''
            };
        }
        
        // ✅ معالجة orderDetails بمرونة عالية
        let orderDetails = [];
        const rawDetails = orderData.orderDetails;
        
        if (Array.isArray(rawDetails)) {
            orderDetails = rawDetails;
        } else if (typeof rawDetails === 'object' && rawDetails !== null) {
            if (rawDetails.mapValue?.fields) {
                const fields = rawDetails.mapValue.fields;
                orderDetails = Object.values(fields).map(f => {
                    const value = f.mapValue?.fields || {};
                    return {
                        name: value.name?.stringValue || '',
                        size: value.size?.stringValue || '',
                        qty: parseInt(value.qty?.integerValue || value.qty?.stringValue || 0),
                        price: parseFloat(value.price?.doubleValue || value.price?.stringValue || 0),
                        costPrice: parseFloat(value.costPrice?.doubleValue || value.costPrice?.stringValue || 0),
                        sku: value.sku?.stringValue || null,
                        productId: value.productId?.stringValue || null,
                        image: value.image?.stringValue || ''
                    };
                });
            } else {
                orderDetails = Object.values(rawDetails);
            }
        } else if (typeof rawDetails === 'string') {
            try {
                const parsed = JSON.parse(rawDetails);
                orderDetails = Array.isArray(parsed) ? parsed : Object.values(parsed);
            } catch {
                const matches = rawDetails.match(/[^\s,]+/g);
                if (matches && matches.length) {
                    orderDetails = matches.map(name => ({
                        name: name,
                        size: 'غير محدد',
                        qty: 1,
                        price: 0,
                        costPrice: 0,
                        sku: null,
                        productId: null
                    }));
                }
            }
        }
        
        // ✅ تنظيف البيانات
        orderDetails = orderDetails.filter(item => item && typeof item === 'object');
        orderDetails = orderDetails.map(item => ({
            productId: item.productId || null,
            sku: item.sku || null,
            name: item.name || 'منتج غير معروف',
            size: item.size || 'غير محدد',
            qty: parseInt(item.qty) || 1,
            price: parseFloat(item.price) || 0,
            costPrice: parseFloat(item.costPrice) || 0,
            image: item.image || ''
        }));
        
        console.log("📦 [استرداد] تفاصيل الطلب بعد المعالجة:", orderDetails);
        
        if (orderDetails.length === 0) {
            customAlert('⚠️ لا توجد تفاصيل طلب صالحة للاسترداد. يرجى التحقق من سجل التدقيق.', 'warning');
            return;
        }
        
        // ✅ التحقق من المخزون (فقط إذا كان الطلب غير موجود)
        const orderSnap = await getDoc(doc(db, "orders", orderId));
        const orderExists = orderSnap.exists();
        
        if (!orderExists) {
            for (const item of orderDetails) {
                if (!item.name || !item.size) continue;
                let productDoc = null;
                if (item.productId) {
                    productDoc = await getDoc(doc(db, "products", item.productId));
                } else {
                    const productSnap = await getDocs(query(collection(db, "products"), where("name", "==", item.name)));
                    if (!productSnap.empty) productDoc = productSnap.docs[0];
                }
                if (productDoc && productDoc.exists()) {
                    const stockBySize = productDoc.data().stockBySize || {};
                    const currentStock = stockBySize[item.size];
                    if (currentStock !== null && currentStock !== undefined && currentStock < item.qty) {
                        customAlert(`❌ المخزون غير كافٍ للمنتج "${item.name}" مقاس ${item.size} (المتوفر: ${currentStock}، المطلوب: ${item.qty})`, 'error');
                        return;
                    }
                }
            }
        }
        
        // ✅ إذا كان الطلب موجوداً، نسأل المستخدم
        if (orderExists) {
            const confirmed = await customConfirm(`⚠️ الطلب ${logData.orderNumber || orderId} لا يزال موجوداً. هل تريد استبداله بالبيانات المحفوظة؟\n\nملاحظة: لن يتم خصم المخزون مرة أخرى.`);
            if (!confirmed) return;
        }
        
        // ✅ حساب الإجماليات
        const subtotal = orderDetails.reduce((sum, item) => sum + (item.price * item.qty), 0);
        const totalCost = orderDetails.reduce((sum, item) => sum + (item.costPrice * item.qty), 0);
        const shipping = parseFloat(orderData.shipping) || 70;
        const shippingCostPaid = parseFloat(orderData.shippingCostPaid) || 70;
        const finalTotal = parseFloat(orderData.finalTotal) || (subtotal + shipping);
        
        // ✅ إنشاء الطلب المسترد
        const restoredOrder = {
            orderID: logData.orderNumber || `VNT-RESTORED-${Date.now()}`,
            customerName: orderData.customerName || 'مسترد',
            phone: orderData.phone || '',
            gov: orderData.gov || '',
            city: orderData.city || '',
            address: orderData.address || '',
            orderDetails: orderDetails,
            finalTotal: finalTotal,
            quantity: orderDetails.reduce((sum, item) => sum + item.qty, 0),
            price: subtotal,
            shipping: shipping,
            shippingCostPaid: shippingCostPaid,
            totalCost: totalCost,
            profit: finalTotal - totalCost - shippingCostPaid,
            coupon: orderData.coupon || null,
            notes: orderData.notes || '',
            status: 'new',
            createdAt: serverTimestamp(),
            restoredAt: serverTimestamp(),
            restoredFrom: logId,
            originalOrderId: orderId
        };
        
        console.log("📝 [استرداد] الطلب المسترد النهائي:", restoredOrder);
        
        // ✅ حفظ الطلب (استبدال أو إنشاء)
        await setDoc(doc(db, "orders", orderId), restoredOrder);
        
        // ✅ خصم المخزون فقط إذا كان الطلب غير موجود سابقاً
        if (!orderExists) {
            for (const item of orderDetails) {
                if (!item.name || !item.size) continue;
                let productDoc = null;
                if (item.productId) {
                    productDoc = await getDoc(doc(db, "products", item.productId));
                } else {
                    const productSnap = await getDocs(query(collection(db, "products"), where("name", "==", item.name)));
                    if (!productSnap.empty) productDoc = productSnap.docs[0];
                }
                if (productDoc && productDoc.exists()) {
                    const productRef = doc(db, "products", productDoc.id);
                    const stockBySize = productDoc.data().stockBySize || {};
                    const currentStock = stockBySize[item.size];
                    if (currentStock !== null && currentStock !== undefined) {
                        stockBySize[item.size] = Math.max(0, (currentStock || 0) - item.qty);
                        await updateDoc(productRef, { stockBySize });
                    }
                }
            }
            console.log("✅ [استرداد] تم خصم المخزون (طلب جديد)");
        } else {
            console.log("ℹ️ [استرداد] الطلب موجود بالفعل، تم تخطي خصم المخزون");
        }
        
        // ✅ تسجيل حدث الاسترداد
        try {
            const { logAuditEvent } = await import('./js/logger.js');
            await logAuditEvent({
                action: 'order_restored',
                orderId: orderId,
                orderNumber: restoredOrder.orderID,
                details: {
                    restoredFromLogId: logId,
                    customerName: restoredOrder.customerName,
                    phone: restoredOrder.phone,
                    finalTotal: restoredOrder.finalTotal,
                    orderDetailsCount: orderDetails.length,
                    wasExisting: orderExists,
                    notes: `تم استرداد الطلب من سجل التدقيق (${logId})${orderExists ? ' - كان موجوداً' : ''}`
                },
                performedBy: window.currentUserEmail || 'system',
                severity: 'info'
            });
        } catch(e) {
            console.warn("⚠️ [استرداد] فشل تسجيل حدث الاسترداد:", e);
        }
        
        customAlert(`✅ تم استرداد الطلب ${restoredOrder.orderID} بنجاح!`, 'success');
        
        // ✅ تحديث الواجهات
        try {
            if (typeof window.forceRender === 'function') {
                await window.forceRender();
            } else if (typeof window.render === 'function') {
                const ordersRef = collection(db, "orders");
                const q = query(ordersRef, orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                if (window.orders !== undefined) {
                    window.orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                }
                window.render();
            }
            await loadLogs(true);
        } catch (e) {
            console.warn("⚠️ [استرداد] فشل تحديث الواجهة:", e);
            setTimeout(() => window.location.reload(), 2000);
        }
        
    } catch (error) {
        console.error('❌ فشل استرداد الطلب:', error);
        customAlert('❌ حدث خطأ أثناء استرداد الطلب: ' + error.message, 'error');
    }
};

    window.exportToExcel = function() {
        const dataToExport = filteredLogs.length > 0 ? filteredLogs : allLogs;
        if (dataToExport.length === 0) {
            alert('⚠️ لا توجد بيانات للتصدير');
            return;
        }

        const rows = [
            ['#', 'التاريخ', 'رقم الطلب', 'نوع العملية', 'التفاصيل', 'المستخدم', 'المعرف']
        ];

        dataToExport.forEach((log, index) => {
            let details = '';
            if (log.action === 'status_change') {
                details = `من ${log.oldStatus || '؟'} → ${log.newStatus || '؟'}`;
                if (log.notes) details += ` | ملاحظة: ${log.notes}`;
            } else if (log.action === 'order_created') {
                details = `العميل: ${log.customerName || ''} | المبلغ: ${log.finalTotal || 0}`;
            } else if (log.action === 'order_edited') {
                details = `تعديل: ${(log.changedFields || []).join(', ')}`;
            } else if (log.action === 'order_deleted') {
                details = `العميل: ${log.customerName || ''}`;
            } else if (log.action === 'return_confirmed') {
                details = 'تأكيد استلام مرتجع';
            }

            rows.push([
                index + 1,
                formatDate(log.timestamp),
                log.orderNumber || log.orderId || '-',
                getActionLabel(log.action),
                details,
                log.performedBy || 'نظام',
                log.id
            ]);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, "سجل التدقيق");
        XLSX.writeFile(wb, `audit_log_${new Date().toISOString().slice(0,10)}.xlsx`);
    };
    
    window.deleteOldLogs = async function() {
    const days = parseInt(document.getElementById('deleteDaysSelect').value);
    const cutoffDate = new Date();
    cutoffDate.setDate(cutoffDate.getDate() - days);
    
    const confirmed = await customConfirm(`⚠️ هل أنت متأكد من حذف جميع سجلات التدقيق الأقدم من ${days} يوم (قبل ${cutoffDate.toLocaleDateString('ar-EG')})؟\n\nهذا الإجراء لا يمكن التراجع عنه!`);
    if (!confirmed) return;
    
    try {
        document.getElementById('deleteStatus').innerHTML = '⏳ جاري الحذف...';
        
        let deletedCount = 0;
        let hasMore = true;
        
        while (hasMore) {
            const snapshot = await getDocs(query(
                collection(db, "auditLog"),
                where('createdAt', '<', cutoffDate),
                orderBy('createdAt', 'desc'),
                limit(500)
            ));
            
            if (snapshot.empty) {
                hasMore = false;
                break;
            }
            
            const batch = writeBatch(db);
            snapshot.forEach(doc => {
                batch.delete(doc.ref);
                deletedCount++;
            });
            
            await batch.commit();
            document.getElementById('deleteStatus').innerHTML = `⏳ تم حذف ${deletedCount} سجل...`;
        }
        
        document.getElementById('deleteStatus').innerHTML = `✅ تم حذف ${deletedCount} سجل بنجاح!`;
        loadLogs(); // تحديث العرض
        
        customAlert(`✅ تم حذف ${deletedCount} سجل تدقيق أقدم من ${days} يوم`, 'success');
        
    } catch (error) {
        console.error("❌ فشل حذف السجلات:", error);
        document.getElementById('deleteStatus').innerHTML = '❌ حدث خطأ: ' + error.message;
        customAlert('❌ حدث خطأ أثناء حذف السجلات: ' + error.message, 'error');
    }
};
