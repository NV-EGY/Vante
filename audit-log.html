<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA لكل تطبيق على حدة (سجل التدقيق) -->
    <link rel="manifest" href="manifest-audit.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="سجل التدقيق VANTÉ">
    <meta name="application-name" content="سجل التدقيق VANTÉ">
    <meta name="theme-color" content="#D4AF37">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="images/icon-512x512.png">
    <title>سجل التدقيق - VANTÉ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* ========== الأنماط العامة ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f4f6f9;
            padding: 20px;
            color: #111;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: #fff;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 28px;
            font-weight: 900;
            color: #111;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 i {
            color: #D4AF37;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }
        .btn-primary {
            background: #111;
            color: #fff;
        }
        .btn-primary:hover {
            background: #D4AF37;
            color: #000;
            transform: translateY(-2px);
        }
        .btn-gold {
            background: #D4AF37;
            color: #000;
        }
        .btn-gold:hover {
            background: #B8860B;
            color: #fff;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #ddd;
            color: #555;
        }
        .btn-outline:hover {
            border-color: #D4AF37;
            color: #D4AF37;
        }

        /* ========== الإحصائيات ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 18px 20px;
            border-right: 4px solid #D4AF37;
            transition: 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: 900;
            color: #111;
        }
        .stat-card .label {
            font-size: 13px;
            color: #777;
            font-weight: 600;
        }
        .stat-card .icon {
            float: left;
            font-size: 28px;
            color: #D4AF37;
            opacity: 0.5;
        }

        /* ========== الفلاتر ========== */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 20px;
            align-items: center;
        }
        .filter-bar label {
            font-weight: 700;
            font-size: 13px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-bar input,
        .filter-bar select {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-family: 'Cairo', sans-serif;
            background: #fff;
            font-size: 13px;
            min-width: 120px;
        }
        .filter-bar input:focus,
        .filter-bar select:focus {
            border-color: #D4AF37;
            outline: none;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }
        .filter-bar .btn {
            padding: 8px 18px;
            font-size: 13px;
        }

        /* ========== الجدول ========== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #eee;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead {
            background: #111;
            color: #fff;
        }
        thead th {
            padding: 14px 16px;
            text-align: center;
            white-space: nowrap;
            font-weight: 700;
        }
        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: 0.2s;
        }
        tbody tr:hover {
            background: #fafafa;
        }
        tbody td {
            padding: 12px 16px;
            text-align: center;
            vertical-align: middle;
        }
        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
        }
        .badge-status-change {
            background: #f39c12;
            color: #fff;
        }
        .badge-order-created {
            background: #2ecc71;
            color: #fff;
        }
        .badge-order-edited {
            background: #3498db;
            color: #fff;
        }
        .badge-order-deleted {
            background: #e74c3c;
            color: #fff;
        }
        .badge-return-confirmed {
            background: #9b59b6;
            color: #fff;
        }
        .text-muted {
            color: #999;
            font-size: 12px;
        }
        .action-icon {
            font-size: 14px;
            margin-left: 6px;
        }

        /* ========== لا توجد بيانات ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 15px;
        }

        /* ========== التجاوب ========== */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            h1 { font-size: 22px; }
            .stat-card .number { font-size: 22px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-bar input, .filter-bar select { min-width: unset; }
            .header-actions { flex-direction: column; align-items: stretch; }
        }

        /* ========== شريط التمرير الجميل ========== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        /* ========== مودال تأكيد ========== */
        .confirm-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .confirm-overlay.active {
            display: flex;
        }
        .confirm-box {
            background: #fff;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            direction: rtl;
        }
        .confirm-box h3 {
            margin-bottom: 15px;
            color: #D4AF37;
        }
        .confirm-box .buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .confirm-box .buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        .confirm-box .btn-yes {
            background: #111;
            color: #fff;
        }
        .confirm-box .btn-yes:hover {
            background: #D4AF37;
            color: #000;
        }
        .confirm-box .btn-no {
            background: #f0f0f0;
            color: #333;
        }
        .confirm-box .btn-no:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- رأس الصفحة -->
    <div class="header-actions">
        <h1><i class="fas fa-clipboard-list"></i> سجل التدقيق</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-gold" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> تصدير Excel</button>
            <button class="btn btn-outline" onclick="exportToCSV()"><i class="fas fa-file-csv"></i> CSV</button>
            <button class="btn btn-primary" onclick="refreshLog()"><i class="fas fa-sync"></i> تحديث</button>
            <button class="btn btn-outline" onclick="clearFilters()"><i class="fas fa-undo"></i> مسح الفلاتر</button>
            <button class="btn btn-danger" onclick="clearAllLogs()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
        </div>
        <label><i class="fas fa-exclamation-triangle"></i> الخطورة</label>
<select id="filterSeverity">
    <option value="all">الكل</option>
    <option value="info">ℹ️ عادي</option>
    <option value="warning">⚠️ تنبيه</option>
    <option value="error">❌ خطأ</option>
</select>
    </div>

    <!-- الإحصائيات -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="number" id="statTotal">0</div><div class="label">📋 إجمالي العمليات</div><div class="icon"><i class="fas fa-list"></i></div></div>
        <div class="stat-card"><div class="number" id="statToday">0</div><div class="label">📅 اليوم</div><div class="icon"><i class="fas fa-calendar-day"></i></div></div>
        <div class="stat-card"><div class="number" id="statStatusChange">0</div><div class="label">🔄 تغييرات الحالة</div><div class="icon"><i class="fas fa-exchange-alt"></i></div></div>
        <div class="stat-card"><div class="number" id="statOrders">0</div><div class="label">🆕 طلبات جديدة</div><div class="icon"><i class="fas fa-plus-circle"></i></div></div>
        <div class="stat-card"><div class="number" id="statDeleted">0</div><div class="label">🗑️ طلبات محذوفة</div><div class="icon"><i class="fas fa-trash"></i></div></div>
    </div>

    <!-- شريط الفلاتر -->
    <div class="filter-bar">
        <label><i class="fas fa-calendar-alt"></i> من</label>
        <input type="date" id="filterDateFrom">
        <label>إلى</label>
        <input type="date" id="filterDateTo">
        <label><i class="fas fa-tag"></i> نوع العملية</label>
        <select id="filterAction">
            <option value="all">الكل</option>
            <option value="status_change">تغيير حالة</option>
            <option value="order_created">طلب جديد</option>
            <option value="order_edited">تعديل طلب</option>
            <option value="order_deleted">حذف طلب</option>
            <option value="return_confirmed">تأكيد مرتجع</option>
        </select>
        <label><i class="fas fa-search"></i> رقم الطلب</label>
        <input type="text" id="filterOrderNumber" placeholder="VNT-001">
        <label><i class="fas fa-user"></i> المستخدم</label>
        <input type="text" id="filterUser" placeholder="البريد الإلكتروني">
        <button class="btn btn-primary" onclick="applyFilters()"><i class="fas fa-filter"></i> تطبيق</button>
    </div>

    <!-- الجدول -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>التاريخ والوقت</th>
                    <th>رقم الطلب</th>
                    <th>نوع العملية</th>
                    <th>التفاصيل</th>
                    <th>المستخدم</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                <tr><td colspan="7"><div class="empty-state"><i class="fas fa-hourglass-half"></i><p>جاري تحميل سجل التدقيق...</p></div></td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- مودال تأكيد الحذف -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <h3><i class="fas fa-exclamation-triangle"></i> تأكيد الحذف</h3>
        <p id="confirmMessage">هل أنت متأكد من حذف سجل التدقيق بالكامل؟ هذا الإجراء لا يمكن التراجع عنه.</p>
        <div class="buttons">
            <button class="btn-no" onclick="closeConfirm()">إلغاء</button>
            <button class="btn-yes" id="confirmDeleteBtn">نعم، حذف الكل</button>
        </div>
    </div>
</div>

<script type="module">
    // ============================================================
    // 🔥 تهيئة Firebase
    // ============================================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
        getFirestore, collection, query, orderBy, onSnapshot,
        deleteDoc, doc, getDocs, limit, startAfter, where,
        getCountFromServer, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    const firebaseConfig = {
        apiKey: "AIzaSyCotT8EP2uy_HsgHknxeGBorKoEUORPtmU",
        authDomain: "vante-orders.firebaseapp.com",
        projectId: "vante-orders",
        storageBucket: "vante-orders.firebasestorage.app",
        messagingSenderId: "842319700646",
        appId: "1:842319700646:web:f6afd78ef7038c3be4ca67"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // ============================================================
    // المتغيرات العامة
    // ============================================================
    let allLogs = [];
    let filteredLogs = [];
    let currentUser = null;
    let lastVisible = null;
    const PAGE_SIZE = 100;
    let isLoading = false;
    let allLoaded = false;

    // ============================================================
    // أدوات مساعدة
    // ============================================================
    function formatDate(timestamp) {
        if (!timestamp) return '-';
        const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return d.toLocaleString('ar-EG', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    function getBadgeClass(action) {
        const map = {
            'status_change': 'badge-status-change',
            'order_created': 'badge-order-created',
            'order_edited': 'badge-order-edited',
            'order_deleted': 'badge-order-deleted',
            'return_confirmed': 'badge-return-confirmed'
        };
        return map[action] || 'badge-status-change';
    }

    function getActionLabel(action) {
        const map = {
            'status_change': '🔄 تغيير حالة',
            'order_created': '✅ طلب جديد',
            'order_edited': '✏️ تعديل طلب',
            'order_deleted': '🗑️ حذف طلب',
            'return_confirmed': '📦 تأكيد مرتجع'
        };
        return map[action] || action;
    }

    function getActionIcon(action) {
        const map = {
            'status_change': 'fa-exchange-alt',
            'order_created': 'fa-plus-circle',
            'order_edited': 'fa-edit',
            'order_deleted': 'fa-trash',
            'return_confirmed': 'fa-check-double'
        };
        return map[action] || 'fa-circle';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ============================================================
    // تحميل البيانات (مباشر)
    // ============================================================
    function loadLogs() {
        const q = query(
            collection(db, "auditLog"),
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snapshot) => {
            allLogs = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            updateStats();
            applyFilters();
        }, (error) => {
            console.error("خطأ في تحميل سجل التدقيق:", error);
            document.getElementById("logTableBody").innerHTML = `
                <tr><td colspan="7">
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color:#e74c3c;"></i>
                        <p>❌ حدث خطأ في تحميل البيانات: ${error.message}</p>
                    </div>
                </td></tr>
            `;
        });
    }

    // ============================================================
    // الإحصائيات
    // ============================================================
    function updateStats() {
        const total = allLogs.length;
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const todayLogs = allLogs.filter(log => {
            const d = log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
            return d >= today;
        });

        const statusChanges = allLogs.filter(l => l.action === 'status_change').length;
        const ordersCreated = allLogs.filter(l => l.action === 'order_created').length;
        const ordersDeleted = allLogs.filter(l => l.action === 'order_deleted').length;

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statToday').textContent = todayLogs.length;
        document.getElementById('statStatusChange').textContent = statusChanges;
        document.getElementById('statOrders').textContent = ordersCreated;
        document.getElementById('statDeleted').textContent = ordersDeleted;
    }

    // ============================================================
    // عرض البيانات
    // ============================================================
    function renderLogs(logs) {
        const tbody = document.getElementById('logTableBody');

        if (!logs || logs.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="7">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>لا توجد سجلات مطابقة للبحث</p>
                    </div>
                </td></tr>
            `;
            return;
        }
        // داخل renderLogs
const severityIcons = {
  info: 'ℹ️',
  warning: '⚠️',
  error: '❌'
};
const severityColor = {
  info: '#3498db',
  warning: '#f39c12',
  error: '#e74c3c'
};
const sevIcon = severityIcons[log.severity] || 'ℹ️';
const sevColor = severityColor[log.severity] || '#3498db';
// إضافة عمود:
`<td><span style="color:${sevColor}">${sevIcon}</span></td>`

        let html = '';
        logs.forEach((log, index) => {
            const actionLabel = getActionLabel(log.action);
            const badgeClass = getBadgeClass(log.action);
            const icon = getActionIcon(log.action);

            // بناء تفاصيل العملية
            let details = '';
            if (log.action === 'status_change') {
                details = `من <strong>${escapeHtml(log.oldStatus || '؟')}</strong> → <strong>${escapeHtml(log.newStatus || '؟')}</strong>`;
                if (log.notes) details += ` | 📝 ${escapeHtml(log.notes)}`;
            } else if (log.action === 'order_created') {
                details = `العميل: ${escapeHtml(log.customerName || 'غير معروف')} | 💰 ${log.finalTotal || 0} جنيه`;
            } else if (log.action === 'order_edited') {
                const fields = log.changedFields?.join(', ') || 'بيانات الطلب';
                details = `تم تعديل: ${escapeHtml(fields)}`;
            } else if (log.action === 'order_deleted') {
                details = `العميل: ${escapeHtml(log.customerName || 'غير معروف')}`;
            } else if (log.action === 'return_confirmed') {
                details = `تم تأكيد استلام المرتجع`;
            }

            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${formatDate(log.timestamp)}</td>
                    <td><strong>${escapeHtml(log.orderNumber || log.orderId || '-')}</strong></td>
                    <td><span class="badge ${badgeClass}"><i class="fas ${icon} action-icon"></i> ${actionLabel}</span></td>
                    <td style="text-align:right; font-size:13px;">${details}</td>
                    <td>${escapeHtml(log.performedBy || 'نظام')}</td>
                    <td>
                        <button class="btn btn-outline" style="padding:4px 12px; font-size:12px;" onclick="viewLog('${log.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-danger" style="padding:4px 12px; font-size:12px;" onclick="deleteLog('${log.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        });

        tbody.innerHTML = html;
    }

    // ============================================================
    // الفلاتر
    // ============================================================
    function applyFilters() {
      // داخل applyFilters
const severity = document.getElementById('filterSeverity').value;
// ...
if (severity !== 'all' && log.severity !== severity) return false;
        const dateFrom = document.getElementById('filterDateFrom').value;
        const dateTo = document.getElementById('filterDateTo').value;
        const action = document.getElementById('filterAction').value;
        const orderNumber = document.getElementById('filterOrderNumber').value.trim().toLowerCase();
        const user = document.getElementById('filterUser').value.trim().toLowerCase();

        filteredLogs = allLogs.filter(log => {
            // فلتر التاريخ
            if (dateFrom) {
                const d = log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
                if (d < new Date(dateFrom)) return false;
            }
            if (dateTo) {
                const d = log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
                const end = new Date(dateTo);
                end.setHours(23, 59, 59);
                if (d > end) return false;
            }

            // فلتر نوع العملية
            if (action !== 'all' && log.action !== action) return false;

            // فلتر رقم الطلب
            if (orderNumber) {
                const logOrder = (log.orderNumber || log.orderId || '').toLowerCase();
                if (!logOrder.includes(orderNumber)) return false;
            }

            // فلتر المستخدم
            if (user) {
                const logUser = (log.performedBy || '').toLowerCase();
                if (!logUser.includes(user)) return false;
            }

            return true;
        });

        renderLogs(filteredLogs);
    }

    // ============================================================
    // دوال عمومية (للـ HTML)
    // ============================================================
    window.applyFilters = applyFilters;

    window.clearFilters = function() {
        document.getElementById('filterDateFrom').value = '';
        document.getElementById('filterDateTo').value = '';
        document.getElementById('filterAction').value = 'all';
        document.getElementById('filterOrderNumber').value = '';
        document.getElementById('filterUser').value = '';
        applyFilters();
    };

    window.refreshLog = function() {
        // onSnapshot يعمل تلقائياً، لكن نعيد التحميل لتحديث الواجهة
        applyFilters();
        // إظهار رسالة نجاح سريعة
        const toast = document.createElement('div');
        toast.style.cssText = `
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #111; color: #D4AF37; padding: 14px 28px;
            border-radius: 50px; font-weight: 700; z-index: 99999;
            border: 1px solid #D4AF37; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            direction: rtl;
        `;
        toast.innerHTML = '<i class="fas fa-check-circle"></i> تم تحديث سجل التدقيق';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    };

    window.viewLog = function(id) {
    const log = allLogs.find(l => l.id === id);
    if (!log) return;
    const details = JSON.stringify(log, null, 2);
    // استخدم مودال بدل alert ليكون احترافياً
    alert(`📋 تفاصيل السجل:\n\n${details}`);
};

    window.deleteLog = async function(id) {
        if (!confirm('⚠️ هل أنت متأكد من حذف هذا السجل؟')) return;
        try {
            await deleteDoc(doc(db, "auditLog", id));
            // سيتم التحديث تلقائياً عبر onSnapshot
        } catch (e) {
            alert('❌ حدث خطأ أثناء الحذف: ' + e.message);
        }
    };

    window.clearAllLogs = function() {
        document.getElementById('confirmMessage').innerHTML =
            '⚠️ هل أنت متأكد من حذف <strong>جميع</strong> سجلات التدقيق؟ هذا الإجراء <strong>لا يمكن التراجع عنه</strong>.';
        document.getElementById('confirmOverlay').classList.add('active');
        document.getElementById('confirmDeleteBtn').onclick = async function() {
            document.getElementById('confirmOverlay').classList.remove('active');
            const confirmed = confirm('✅ تأكيد نهائي: هل تريد حذف كل سجلات التدقيق؟');
            if (!confirmed) return;
            try {
                const snapshot = await getDocs(collection(db, "auditLog"));
                const batch = [];
                snapshot.forEach(d => {
                    batch.push(deleteDoc(doc(db, "auditLog", d.id)));
                });
                await Promise.all(batch);
                alert('✅ تم حذف جميع السجلات بنجاح.');
            } catch (e) {
                alert('❌ حدث خطأ: ' + e.message);
            }
        };
    };

    window.closeConfirm = function() {
        document.getElementById('confirmOverlay').classList.remove('active');
    };

    window.exportToExcel = function() {
        const dataToExport = filteredLogs.length > 0 ? filteredLogs : allLogs;
        if (dataToExport.length === 0) {
            alert('⚠️ لا توجد بيانات للتصدير');
            return;
        }

        const rows = [
            ['#', 'التاريخ', 'رقم الطلب', 'نوع العملية', 'التفاصيل', 'المستخدم', 'المعرف']
        ];

        dataToExport.forEach((log, index) => {
            let details = '';
            if (log.action === 'status_change') {
                details = `من ${log.oldStatus || '؟'} → ${log.newStatus || '؟'}`;
                if (log.notes) details += ` | ملاحظة: ${log.notes}`;
            } else if (log.action === 'order_created') {
                details = `العميل: ${log.customerName || ''} | المبلغ: ${log.finalTotal || 0}`;
            } else if (log.action === 'order_edited') {
                details = `تعديل: ${(log.changedFields || []).join(', ')}`;
            } else if (log.action === 'order_deleted') {
                details = `العميل: ${log.customerName || ''}`;
            } else if (log.action === 'return_confirmed') {
                details = 'تأكيد استلام مرتجع';
            }

            rows.push([
                index + 1,
                formatDate(log.timestamp),
                log.orderNumber || log.orderId || '-',
                getActionLabel(log.action),
                details,
                log.performedBy || 'نظام',
                log.id
            ]);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, "سجل التدقيق");
        XLSX.writeFile(wb, `audit_log_${new Date().toISOString().slice(0,10)}.xlsx`);
    };
    window.exportToCSV = function() {
    const data = filteredLogs.length > 0 ? filteredLogs : allLogs;
    if (!data.length) return alert('لا توجد بيانات');
    let csv = '#,التاريخ,رقم الطلب,نوع العملية,التفاصيل,المستخدم,المعرف\n';
    data.forEach((log, i) => {
        // بناء الصفوف بنفس طريقة Excel
        // ...
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `audit_log_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
};

    // ============================================================
    // دالة تسجيل الأحداث (تستخدم من بقية النظام)
    // ============================================================
    window.logAuditEvent = async function(data) {
        try {
            const { action, orderId, orderNumber, details } = data;
            const logData = {
                action,
                orderId: orderId || null,
                orderNumber: orderNumber || null,
                timestamp: Timestamp.now(),
                performedBy: currentUser?.email || 'system',
                ...details
            };
            // في حال عدم وجود مجموعة، ستُنشأ تلقائياً
            const { addDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
            await addDoc(collection(db, "auditLog"), logData);
        } catch (e) {
            console.error('فشل تسجيل حدث التدقيق:', e);
        }
    };

    // ============================================================
    // بدء التشغيل
    // ============================================================
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadLogs();
        } else {
            // إعادة توجيه لتسجيل الدخول
            window.location.href = 'login.html';
        }
    });

    // تحميل إضافي عند التمرير (للكميات الكبيرة)
    // لكننا نعتمد على onSnapshot الذي يجلب كل البيانات، مناسب حتى 10,000 سجل.

    console.log('✅ صفحة سجل التدقيق جاهزة بخبرة 70 سنة برمجة!');
</script>
