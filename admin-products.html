<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Products</title>

<style>
body{
    font-family:Cairo;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#000;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#D4AF37;
    color:#000;
}

.product{
    background:#fff;
    border:1px solid #eee;
    padding:15px;
    margin-top:15px;
    border-radius:12px;
    display:flex;
    gap:15px;
    align-items:center;
    justify-content:space-between;
}

.product img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:10px;
}

.info{
    flex:1;
}

.delete-btn{
    background:red;
    color:#fff;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>لوحة التحكم - المنتجات</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" type="number" placeholder="السعر">
<input id="image" placeholder="رابط الصورة">
<input id="sizes" placeholder="المقاسات مثال: 16,18,20">

<button onclick="addProduct()">إضافة منتج</button>

<div id="productsList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot,
serverTimestamp,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE CONFIG
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyDGL6mZnkD2jL77egf9GHl6l42vrYlSpSo",
  authDomain: "vante-1.firebaseapp.com",
  projectId: "vante-1",
  storageBucket: "vante-1.appspot.com",
  messagingSenderId: "97830758006",
  appId: "1:97830758006:web:4e6eda347f8f298de8a157"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   ADD PRODUCT
========================= */
window.addProduct = async function () {

const name = document.getElementById("name").value.trim();
const price = Number(document.getElementById("price").value);
const image = document.getElementById("image").value.trim();
const sizes = document.getElementById("sizes").value
.split(",")
.map(s => s.trim())
.filter(s => s);

if (!name || !price || !image) {
    alert("املأ كل البيانات");
    return;
}

await addDoc(collection(db, "products"), {
    name,
    price,
    image,
    sizes,
    createdAt: serverTimestamp()
});

alert("تم إضافة المنتج");

document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("image").value = "";
document.getElementById("sizes").value = "";
};

/* =========================
   LOAD PRODUCTS REALTIME
========================= */
const q = query(collection(db, "products"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {

let html = "";

snapshot.forEach((docSnap) => {

    const p = docSnap.data();

    html += `
    <div class="product">

        <img src="${p.image}">

        <div class="info">
            <h3>${p.name}</h3>
            <p>${p.price} جنيه</p>
            <small>${(p.sizes || []).join(" , ")}</small>
        </div>

        <button class="delete-btn" onclick="deleteProduct('${docSnap.id}')">
            حذف
        </button>

    </div>
    `;
});

document.getElementById("productsList").innerHTML = html || "لا يوجد منتجات";

});

/* =========================
   DELETE PRODUCT
========================= */
window.deleteProduct = async function (id) {

if (!confirm("متأكد من الحذف؟")) return;

await deleteDoc(doc(db, "products", id));

alert("تم الحذف");
};

</script>

</body>
</html>
