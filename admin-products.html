<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Products</title>

<style>
body{font-family:Cairo;background:#f8f8f8;padding:30px}
.container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:15px}
input,button{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ddd}
button{background:#000;color:#fff;font-weight:bold;cursor:pointer}
.product{border:1px solid #ddd;padding:10px;margin-top:10px;border-radius:10px}
img{width:80px;border-radius:10px}
</style>
</head>

<body>

<div class="container">

<h2>إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" type="number" placeholder="السعر">
<input id="image" placeholder="رابط الصورة (URL)">
<input id="sizes" placeholder="المقاسات (16,18,20)">

<button onclick="addProduct()">إضافة</button>

<div id="adminProducts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
serverTimestamp,
onSnapshot,
deleteDoc,
doc,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
apiKey: "AIzaSyDGL6mZnkD2jL77egf9GHl6l42vrYlSpSo",
authDomain: "vante-1.firebaseapp.com",
projectId: "vante-1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD */
const box = document.getElementById("adminProducts");

onSnapshot(query(collection(db,"products"),orderBy("createdAt","desc")),(snap)=>{

let html="";

snap.forEach(d=>{
const p = d.data();

html += `
<div class="product">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.price} جنيه</p>
<button onclick="deleteProduct('${d.id}')">حذف</button>
</div>
`;
});

box.innerHTML = html;

});

/* ADD */
window.addProduct = async function(){

const name = document.getElementById("name").value.trim();
const price = Number(document.getElementById("price").value);
const image = document.getElementById("image").value.trim();
const sizes = document.getElementById("sizes").value.split(",");

if(!name || !price || !image){
alert("كمل البيانات");
return;
}

await addDoc(collection(db,"products"),{
name,
price,
image,
sizes,
createdAt: serverTimestamp()
});

alert("تم إضافة المنتج");

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";
document.getElementById("sizes").value="";

}

/* DELETE */
window.deleteProduct = async function(id){
await deleteDoc(doc(db,"products",id));
alert("تم الحذف");
};

</script>

</body>
</html>
