<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Products</title>

<style>
body{
    font-family:Cairo;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#000;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#D4AF37;
    color:#000;
}

.product{
    background:#fff;
    border:1px solid #eee;
    padding:15px;
    margin-top:15px;
    border-radius:12px;
    display:flex;
    gap:15px;
    align-items:center;
    justify-content:space-between;
}

.product img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:10px;
}

.info{
    flex:1;
}

.delete-btn{
    background:red;
    color:#fff;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>لوحة التحكم - المنتجات</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" type="number" placeholder="السعر">
<input id="image" placeholder="رابط الصورة">
<input id="sizes" placeholder="المقاسات مثال: 16,18,20">
<!-- أضف هذا الحقل أسفل حقل المقاسات مباشرة -->
<input id="category" placeholder="اسم الكولكشن (مثال: خواتم)">

<textarea id="description"
          placeholder="وصف المنتج"
          rows="4"
          style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px;font-family:Cairo;font-size:14px;resize:vertical;"></textarea>

<button onclick="addProduct()">إضافة منتج</button>

<div id="productsList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot,
serverTimestamp,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE CONFIG
========================= */
const firebaseConfig = {
    apiKey: "AIzaSyCotT8EP2uy_HsgHknxeGBorKoEUORPtmU",
    authDomain: "vante-orders.firebaseapp.com",
    projectId: "vante-orders",
    storageBucket: "vante-orders.firebasestorage.app",
    messagingSenderId: "842319700646",
    appId: "1:842319700646:web:f6afd78ef7038c3be4ca67",
    measurementId: "G-56ZC1RW0T7"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   ADD PRODUCT
========================= */
window.addProduct = async function () {

    const name = document.getElementById("name").value.trim();
    const price = Number(document.getElementById("price").value);
    const image = document.getElementById("image").value.trim();
    const category = document.getElementById("category").value.trim();
    const description = document.getElementById("description").value.trim();

    const sizes = document.getElementById("sizes").value
        .split(",")
        .map(size => size.trim())
        .filter(Boolean);

    if (!name || !price || !image || !category || !description) {
        alert("يرجى إدخال جميع البيانات");
        return;
    }

    await addDoc(collection(db, "products"), {
        name,
        price,
        image,
        category,
        description,
        sizes,
        createdAt: serverTimestamp()
    });

    alert("تم إضافة المنتج بنجاح");

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";
    document.getElementById("sizes").value = "";
    document.getElementById("category").value = "";
    document.getElementById("description").value = "";
};

/* =========================
   LOAD PRODUCTS REALTIME
========================= */
const q = query(collection(db, "products"), orderBy("createdAt", "desc"));

/* =========================
   عرض المنتجات
========================= */
onSnapshot(q, (snapshot) => {

    let html = "";

    snapshot.forEach((docSnap) => {

        const p = docSnap.data();

        html += `
        <div class="product">

            <img src="${p.image}" alt="${p.name}">

            <div class="info">
                <h3>${p.name}</h3>
                <p>${p.price} جنيه</p>
                <small>القسم: ${p.category || "عام"}</small><br>
                <small>
                    المقاسات:
                    ${(p.sizes && p.sizes.length)
                        ? p.sizes.join(" - ")
                        : "لا يوجد"}
                </small>
            </div>

            <button class="delete-btn"
                onclick="deleteProduct('${docSnap.id}')">
                حذف
            </button>

        </div>
        `;
    });

    document.getElementById("productsList").innerHTML =
        html || "<p style='text-align:center'>لا توجد منتجات حالياً</p>";
});

/* =========================
   DELETE PRODUCT
========================= */
window.deleteProduct = async function (id) {

if (!confirm("متأكد من الحذف؟")) return;

await deleteDoc(doc(db, "products", id));

alert("تم الحذف");
};

</script>

</body>
</html>
