<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة منتجات VANTÉ</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Cairo',sans-serif;
        }

        body{
            background:#f8f8f8;
            padding:40px 20px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:#fff;
            padding:35px;
            border-radius:25px;
            box-shadow:0 20px 50px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            font-size:34px;
            color:#111;
        }

        input, textarea{
            width:100%;
            padding:16px;
            margin-bottom:18px;
            border:1px solid #ddd;
            border-radius:14px;
            font-size:15px;
        }

        textarea{
            resize:vertical;
            min-height:120px;
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:14px;
            background:#000;
            color:#fff;
            font-size:18px;
            font-weight:800;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#D4AF37;
            color:#000;
        }

        #status{
            margin-top:20px;
            text-align:center;
            font-weight:700;
        }
    </style>
</head>
<body>

<div>
    <h2>إضافة منتج</h2>

    <input id="name" placeholder="اسم المنتج">
    <input id="price" type="number" placeholder="السعر">
    <input id="image" placeholder="رابط الصورة">
    <input id="sizes" placeholder="المقاسات (16,18,20)">
    
    <button onclick="addProduct()">إضافة</button>
</div>
<div id="adminProducts"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp,
    onSnapshot,
    deleteDoc,
    updateDoc,
    doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

/* =========================================
   FIREBASE CONFIG
========================================= */
const firebaseConfig = {
  apiKey: "AIzaSyDGL6mZnkD2jL77egf9GHl6l42vrYlSpSo",
  authDomain: "vante-1.firebaseapp.com",
  projectId: "vante-1",
  storageBucket: "vante-1.firebasestorage.app",
  messagingSenderId: "97830758006",
  appId: "1:97830758006:web:4e6eda347f8f298de8a157",
  measurementId: "G-B06FW6BFT9"
};

/* =========================================
   INIT FIREBASE
========================================= */
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

/* =========================================
   DELETE PRODUCT
========================================= */
window.deleteProduct = async function(id){
    await deleteDoc(doc(db, "products", id));
    alert("تم الحذف");
};

/* =========================================
   EDIT PRODUCT
========================================= */
window.editProduct = async function(id, oldName, oldPrice){

    const newName = prompt("اسم المنتج الجديد", oldName);
    const newPrice = prompt("السعر الجديد", oldPrice);

    if(!newName || !newPrice) return;

    await updateDoc(doc(db, "products", id), {
        name: newName,
        price: Number(newPrice)
    });

    alert("تم التعديل");
};

/* =========================================
   LOAD PRODUCTS
========================================= */
const adminBox = document.getElementById("adminProducts");

onSnapshot(collection(db, "products"), (snapshot) => {

    let html = "";

    snapshot.forEach((docSnap) => {
        const p = docSnap.data();

        html += `
        <div style="border:1px solid #ddd;padding:10px;margin:10px">

            <img src="${p.image}" width="80">

            <h3>${p.name}</h3>
            <p>${p.price} جنيه</p>

            <button onclick="deleteProduct('${docSnap.id}')">حذف</button>
            <button onclick="editProduct('${docSnap.id}', '${p.name}', ${p.price})">تعديل</button>

        </div>
        `;
    });

    adminBox.innerHTML = html;
});

/* =========================================
   ADD PRODUCT
========================================= */
window.addProduct = async function () {

    const name = document.getElementById("name").value;
    const price = Number(document.getElementById("price").value);
    const image = document.getElementById("image").value;

    const sizes = document.getElementById("sizes").value
        .split(",")
        .map(s => s.trim())
        .filter(Boolean);

    await addDoc(collection(db, "products"), {
        name,
        price,
        image,
        sizes,
        createdAt: serverTimestamp()
    });

    alert("تم إضافة المنتج");

};

</script>

</body>
</html>
