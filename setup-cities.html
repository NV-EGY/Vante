<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعداد محافظات QP Express</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Cairo',sans-serif;background:#f4f6f9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;}
    .card{background:#fff;border-radius:24px;padding:40px;max-width:600px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;}
    h1{color:#D4AF37;}
    .status{padding:15px;border-radius:12px;margin:20px 0;font-size:14px;}
    .loading{background:#f0f0f0;color:#555;}
    .success{background:#e8f5e9;color:#2e7d32;border-right:4px solid #2e7d32;}
    .error{background:#ffebee;color:#c62828;border-right:4px solid #c62828;}
    .progress-bar{width:100%;height:6px;background:#eee;border-radius:10px;overflow:hidden;margin:15px 0;}
    .progress-bar .fill{height:100%;background:#D4AF37;width:0%;transition:width 0.3s;border-radius:10px;}
    button{background:#D4AF37;color:#000;border:none;padding:12px 30px;border-radius:30px;font-weight:700;font-size:16px;cursor:pointer;margin-top:15px;}
    button:hover{background:#b8941a;}
    button:disabled{opacity:0.5;cursor:not-allowed;}
    .details{font-size:12px;color:#888;margin-top:10px;}
    .gov-item{background:#f9f9f9;padding:10px;border-radius:12px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;}
    .gov-item input{width:80px;padding:6px;border:1px solid #ddd;border-radius:8px;text-align:center;}
  </style>
</head>
<body>
<div class="card">
  <h1>🏛️ إعداد محافظات QP Express</h1>
  <p>أدخل المعرف الرقمي لكل محافظة كما هو معتمد في نظام QP Express</p>
  <div id="govList"></div>
  <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
  <div id="status" class="status loading">⏳ جاري التحضير...</div>
  <button id="runBtn">🚀 حفظ المحافظات</button>
  <p class="details">📌 سيتم حفظ <span id="govCount">0</span> محافظة في Firestore</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, collection, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCotT8EP2uy_HsgHknxeGBorKoEUORPtmU",
    authDomain: "vante-orders.firebaseapp.com",
    projectId: "vante-orders",
    storageBucket: "vante-orders.firebasestorage.app",
    messagingSenderId: "842319700646",
    appId: "1:842319700646:web:f6afd78ef7038c3be4ca67"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // قائمة المحافظات مع معرفاتها الافتراضية (يمكنك تعديلها بعد الحصول على القائمة الصحيحة من QP)
  const defaultGovs = [
    { name: "القاهرة", id: 1 },
    { name: "الجيزة", id: 3 },
    { name: "القليوبية", id: 4 },
    { name: "الإسكندرية", id: 2 },
    { name: "الدقهلية", id: 21 },
    { name: "الشرقية", id: 14 },
    { name: "الغربية", id: 15 },
    { name: "المنوفية", id: 8 },
    { name: "البحيرة", id: 10 },
    { name: "كفر الشيخ", id: 12 },
    { name: "دمياط", id: 22 },
    { name: "بورسعيد", id: 20 },
    { name: "الإسماعيلية", id: 18 },
    { name: "السويس", id: 19 },
    { name: "بني سويف", id: 25 },
    { name: "الفيوم", id: 23 },
    { name: "المنيا", id: 24 },
    { name: "أسيوط", id: 26 },
    { name: "سوهاج", id: 28 },
    { name: "قنا", id: 29 },
    { name: "الأقصر", id: 27 },
    { name: "أسوان", id: 6 },
    { name: "البحر الأحمر", id: 16 },
    { name: "الوادي الجديد", id: 31 },
    { name: "مطروح", id: 5 },
    { name: "شمال سيناء", id: 32 },
    { name: "جنوب سيناء", id: 33 }
  ];

  // عرض المحافظات مع حقول editable
  const govListDiv = document.getElementById('govList');
  let govs = [...defaultGovs];

  function renderGovList() {
    govListDiv.innerHTML = govs.map((g, idx) => `
      <div class="gov-item">
        <span><strong>${g.name}</strong></span>
        <span>
          المعرف: <input type="number" id="gov-id-${idx}" value="${g.id}" min="1" step="1">
        </span>
      </div>
    `).join('');
  }
  renderGovList();

  document.getElementById('govCount').textContent = govs.length;

  const statusDiv = document.getElementById('status');
  const progressFill = document.getElementById('progressFill');
  const btn = document.getElementById('runBtn');

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.textContent = '⏳ جاري الحفظ...';
    statusDiv.className = 'status loading';
    statusDiv.innerText = '⏳ جاري حفظ المحافظات...';

    try {
      // قراءة القيم المدخلة من المستخدم
      const updatedGovs = govs.map((g, idx) => {
        const input = document.getElementById(`gov-id-${idx}`);
        return {
          name: g.name,
          id: parseInt(input.value) || g.id
        };
      });

      // حذف جدول cities القديم (إذا كنت تريد استبداله بالكامل)
      const citiesSnap = await getDocs(collection(db, "cities"));
      for (const docSnap of citiesSnap.docs) {
        await deleteDoc(doc(db, "cities", docSnap.id));
      }

      // حفظ المحافظات في مجموعة جديدة "governorates"
      let count = 0;
      const total = updatedGovs.length;
      for (const gov of updatedGovs) {
        await setDoc(doc(db, "governorates", gov.name), {
          id: gov.id,
          name: gov.name,
          // يمكنك إضافة حقل cityId إذا أردت استخدام اسم آخر
        });
        count++;
        const percent = Math.round((count / total) * 100);
        progressFill.style.width = percent + '%';
        statusDiv.innerText = `⏳ جاري حفظ ${count}/${total} محافظة...`;
      }

      // ✅ أيضاً نضيفها إلى مجموعة cities كنسخة احتياطية (بنفس المعرف)
      for (const gov of updatedGovs) {
        await setDoc(doc(db, "cities", gov.name), {
          id: gov.id,
          name: gov.name,
          governorate: gov.name
        });
      }

      statusDiv.className = 'status success';
      statusDiv.innerText = `✅ تم حفظ ${total} محافظة بنجاح! يمكنك الآن إنشاء الطلبات.`;
      btn.textContent = '✅ تم بنجاح';
      progressFill.style.width = '100%';

    } catch (error) {
      console.error(error);
      statusDiv.className = 'status error';
      statusDiv.innerText = '❌ حدث خطأ: ' + error.message;
      btn.disabled = false;
      btn.textContent = '🚀 إعادة المحاولة';
    }
  });
</script>
</body>
</html>
